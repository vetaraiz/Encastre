        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:20}}>Presupuesto{(numero!==""&&numero!=null)?` N° ${numero}`:""}</div>
        <div style={{fontSize:14,alignSelf:"center"}}>Fecha: {fecha||new Date().toLocaleDateString("es-AR")}</div>
      </div>

      {/* Datos empresa / cliente */}
      <div style={{display:"flex",flexWrap:"wrap",borderBottom:`2px solid ${V}`}}>
        <div style={{flex:1,minWidth:220,padding:"12px 14px",borderRight:`1px solid ${C.borde}`}}>
          <div style={{fontSize:12,fontWeight:700,color:V,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Datos de la empresa</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:18,color:C.marron,marginBottom:4}}>{empresa.nombre||"—"}</div>
          {/* datos públicos justo debajo del nombre */}
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:6}}>
            {empresa.instagram&&<a href={linkIg(empresa.instagram)} target="_blank" rel="noreferrer" style={{fontSize:13,color:V,textDecoration:"none",fontWeight:700}}>📷 {empresa.instagram}</a>}
            {empresa.tiktok&&<a href={linkTt(empresa.tiktok)} target="_blank" rel="noreferrer" style={{fontSize:13,color:V,textDecoration:"none",fontWeight:700}}>🎵 {empresa.tiktok}</a>}
            {web&&<a href={web} target="_blank" rel="noreferrer" style={{fontSize:13,color:V,textDecoration:"none",fontWeight:700}}>🌐 web</a>}
          </div>
          {dato("Dirección",empresa.direccion)}
          {dato("Barrio",empresa.barrio)}
          {dato("Ciudad",empresa.ciudad)}
          {dato("Teléfono",empresa.telefono)}
          {dato("Email",empresa.email_empresa)}
          {dato(empresa.tipo_documento||"DNI",empresa.documento)}
        </div>
        <div style={{flex:1,minWidth:220,padding:"12px 14px"}}>
          <div style={{fontSize:12,fontWeight:700,color:V,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Datos del cliente</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:18,color:C.marron,marginBottom:4}}>{cliente.nombre||"—"}</div>
          {dato("Barrio",cliente.barrio)}
          {dato("Ciudad",cliente.ciudad)}
          {cliente.mostrar_telefono&&dato("Teléfono",cliente.telefono)}
          {(cliente.mostrar_direccion||(esEmpresa&&aceptado))&&dato("Dirección",cliente.direccion)}
          {(esEmpresa&&aceptado&&!cliente.mostrar_direccion)&&cliente.direccion&&<div style={{fontSize:12,color:V,marginTop:4}}>✓ Dirección visible porque aceptaste este presupuesto.</div>}
        </div>
      </div>

      {/* Tabla de ítems */}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:420}}>
          <thead><tr>
            <th style={th}>Descripción</th>
            <th style={{...th,textAlign:"right"}}>Precio</th>
            <th style={{...th,textAlign:"right"}}>Cant.</th>
            <th style={{...th,textAlign:"right"}}>Importe</th>
          </tr></thead>
          <tbody>
            {filas.length===0?(
              <tr><td style={td} colSpan={4}>Sin ítems.</td></tr>
            ):filas.map((f,i)=>(
              <tr key={i}>
                <td style={td}>{f.descripcion}</td>
                <td style={tdNum}>{fmtPeso(f.precio)}</td>
                <td style={tdNum}>{nmb(f.cantidad)}</td>
                <td style={{...tdNum,fontWeight:700}}>{fmtPeso(f.importe)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Totales */}
      <div style={{padding:"12px 14px",background:C.suave}}>
        <div style={{maxWidth:320,marginLeft:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:15}}><span style={{color:C.textoSuave}}>Subtotal</span><b>{fmtPeso(calc.subtotal)}</b></div>
          {calc.descuento>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:15,color:C.error}}><span>Descuento{o.descuento_tipo==="porcentaje"?` (${nmb(o.descuento_valor)}%)`:""}</span><b>− {fmtPeso(calc.descuento)}</b></div>}
          {calc.iva>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:15}}><span style={{color:C.textoSuave}}>IVA ({nmb(o.iva_pct)}%)</span><b>{fmtPeso(calc.iva)}</b></div>}
          <div style={{display:"flex",justifyContent:"space-between",borderTop:`2px solid ${V}`,paddingTop:8,marginTop:4}}><span style={{fontWeight:800,fontSize:18,color:C.marron}}>TOTAL</span><b style={{fontWeight:800,fontSize:22,color:V}}>{fmtPeso(calc.total)}</b></div>
        </div>
      </div>

      {tiempoEntrega&&<div style={{padding:"10px 14px",borderTop:`1px solid ${C.borde}`,fontSize:14,color:C.textoSuave}}>⏱️ Tiempo de entrega: <b style={{color:C.marron}}>{tiempoEntrega}</b></div>}
    </div>
  );
}

function MiCuenta({usuario,onCerrar,onActualizar,onDarDeBaja}){
  const esCliente = usuario.tipo==="cliente";
  const [solapa,setSolapa]=useState("privado");

  // ── PRIVADO ──
  const [nombre,setNombre]=useState(usuario.nombre||"");
  const [ciudad,setCiudad]=useState(usuario.ciudad||"");
  const [direccion,setDireccion]=useState(usuario.direccion||"");
  const [barrio,setBarrio]=useState(usuario.barrio||"");
  const [telefono,setTelefono]=useState(usuario.telefono||"");
  const [mostrarTel,setMostrarTel]=useState(usuario.mostrar_telefono===true);
  const [mostrarDir,setMostrarDir]=useState(usuario.mostrar_direccion===true);
  const [tipoDoc,setTipoDoc]=useState(usuario.tipo_documento||"DNI");
  const [documento,setDocumento]=useState(usuario.documento||"");
  const [guardandoPriv,setGuardandoPriv]=useState(false);
  const [okPriv,setOkPriv]=useState("");
  const [errPriv,setErrPriv]=useState("");

  // ── CONTRASEÑA ──
  const [passActual,setPassActual]=useState("");
  const [pass1,setPass1]=useState("");
  const [pass2,setPass2]=useState("");
  const [verPass,setVerPass]=useState(false);
  const [guardandoPass,setGuardandoPass]=useState(false);
  const [okPass,setOkPass]=useState("");
  const [errPass,setErrPass]=useState("");

  // ── PÚBLICO ──
  const [instagram,setInstagram]=useState(usuario.instagram||"");
  const [tiktok,setTiktok]=useState(usuario.tiktok||"");
  const [emailEmpresa,setEmailEmpresa]=useState(usuario.email_empresa||"");
  const [web,setWeb]=useState(usuario.web||"");
  const [guardandoPub,setGuardandoPub]=useState(false);
  const [okPub,setOkPub]=useState("");
  const [errPub,setErrPub]=useState("");
  const [fotos,setFotos]=useState([usuario.foto1||"",usuario.foto2||"",usuario.foto3||""]);
  const [procFoto,setProcFoto]=useState(false);

  const parchearSesion=(campos)=>{
    try{
      const s=JSON.parse(localStorage.getItem("encastre_sesion"));
      if(s&&s.usuario){ Object.assign(s.usuario,campos); localStorage.setItem("encastre_sesion",JSON.stringify(s)); }
    }catch{}
    if(onActualizar) onActualizar(campos);
  };

  const guardarPrivado=async()=>{
    setErrPriv(""); setOkPriv("");
    if(!nombre.trim()){ setErrPriv("El nombre no puede quedar vacío."); return; }
    setGuardandoPriv(true);
    const campos={nombre:nombre.trim(),ciudad:ciudad.trim(),direccion:direccion.trim()||null,barrio:barrio.trim()||null,telefono:telefono.trim()||null,mostrar_telefono:mostrarTel,mostrar_direccion:mostrarDir,tipo_documento:tipoDoc,documento:documento.trim()};
    try{
      await db.update("usuarios",campos,`id=eq.${usuario.id}`);
      parchearSesion(campos);
      setOkPriv("Datos guardados.");
    }catch(e){ setErrPriv("No se pudieron guardar los datos: "+(e.message||"revisá tu conexión")); }
    setGuardandoPriv(false);
  };

  const cambiarPass=async()=>{
    setErrPass(""); setOkPass("");
    if(!passActual){ setErrPass("Ingresá tu contraseña actual."); return; }
    if(pass1.length<6){ setErrPass("La nueva contraseña debe tener al menos 6 caracteres."); return; }
    if(pass1!==pass2){ setErrPass("Las contraseñas nuevas no coinciden."); return; }
    if(pass1===passActual){ setErrPass("La nueva contraseña es igual a la actual."); return; }
    setGuardandoPass(true);
    try{
      const chk=await db.signIn(usuario.email,passActual);
      if(!chk.access_token){ setErrPass("La contraseña actual es incorrecta."); setGuardandoPass(false); return; }
      await db.updatePassword(pass1);
      setOkPass("Contraseña actualizada.");
      setPassActual(""); setPass1(""); setPass2("");
    }catch(e){ setErrPass(e.message||"No se pudo cambiar la contraseña."); }
    setGuardandoPass(false);
  };

  const guardarPublico=async()=>{
    setErrPub(""); setOkPub("");
    setGuardandoPub(true);
    const campos={instagram:instagram.trim()||null,tiktok:tiktok.trim()||null,email_empresa:emailEmpresa.trim()||null,web:web.trim()||null};
    try{
      await db.update("usuarios",campos,`id=eq.${usuario.id}`);
      parchearSesion(campos);
      setOkPub("Datos guardados.");
    }catch(e){ setErrPub("No se pudieron guardar los datos: "+(e.message||"revisá tu conexión")); }
    setGuardandoPub(false);
  };

  const guardarFotos=async(nuevas)=>{
    setFotos(nuevas);
    const campos={foto1:nuevas[0]||null,foto2:nuevas[1]||null,foto3:nuevas[2]||null};
    try{
      await db.update("usuarios",campos,`id=eq.${usuario.id}`);
      parchearSesion(campos);
    }catch(e){ setErrPub("No se pudieron guardar las fotos: "+(e.message||"")); }
  };
  const subirFoto=async(i,file)=>{
    if(!file)return;
    setProcFoto(true);
    try{
      const data=await comprimirFoto(file);
      const nuevas=[...fotos]; nuevas[i]=data;
      await guardarFotos(nuevas);
    }catch(e){ setErrPub("No se pudo procesar la foto. Probá con una imagen JPG o PNG."); }
    setProcFoto(false);
  };
  const quitarFoto=(i)=>{ const nuevas=[...fotos]; nuevas[i]=""; guardarFotos(nuevas); };

  const solapaBtn=(id,txt)=>({
    flex:1, background:solapa===id?C.acento:"transparent", color:solapa===id?C.marron:C.textoSuave,
    border:solapa===id?"none":`1px solid ${C.borde}`, borderRadius:9, padding:"12px 8px", cursor:"pointer",
    fontSize:16, fontWeight:700, fontFamily:"'Lato',sans-serif", minHeight:46,
  });
  const msg=(t,tipo)=> t?<div style={{fontSize:15,fontWeight:700,color:tipo==="ok"?C.exito:C.error,marginTop:10}}>{t}</div>:null;

  return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <button style={{...S.btn("ghost"),marginBottom:16}} onClick={onCerrar}>← Volver</button>
      <div style={{...S.cardTitle,fontSize:26,marginBottom:16}}>👤 Mi cuenta</div>

      <div style={{display:"flex",gap:8,marginBottom:18}}>
        <button style={solapaBtn("privado","🔒 Privado")} onClick={()=>setSolapa("privado")}>🔒 Privado</button>
        {!esCliente&&<button style={solapaBtn("publico","🌐 Público")} onClick={()=>setSolapa("publico")}>🌐 Público</button>}
      </div>

      {solapa==="privado"&&(
        <div>
          <div style={S.card}>
            <div style={S.cardTitle}>Datos personales</div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Nombre / Razón social</label>
              <input style={S.input} value={nombre} onChange={e=>setNombre(e.target.value)}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Ciudad</label>
              <input style={S.input} value={ciudad} onChange={e=>setCiudad(e.target.value)}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Dirección</label>
              <input style={S.input} value={direccion} onChange={e=>setDireccion(e.target.value)} placeholder="Calle y número"/>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
              <div style={{flex:1,minWidth:140}}>
                <label style={S.label}>Barrio</label>
                <input style={S.input} value={barrio} onChange={e=>setBarrio(e.target.value)}/>
              </div>
              <div style={{flex:1,minWidth:140}}>
                <label style={S.label}>Teléfono</label>
                <input style={S.input} value={telefono} onChange={e=>setTelefono(e.target.value)}/>
              </div>
            </div>
            {esCliente&&(
              <div style={{border:`1px solid ${C.borde}`,borderRadius:10,padding:12,marginBottom:14,background:C.suave}}>
                <div style={{fontSize:14,fontWeight:700,color:C.marron,marginBottom:8}}>🔒 Privacidad: qué ven las empresas en tus pedidos</div>
                <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:16,color:C.texto,marginBottom:8}}>
                  <input type="checkbox" checked={mostrarTel} onChange={e=>setMostrarTel(e.target.checked)}/>
                  Mostrar mi teléfono a las empresas
                </label>
                <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:16,color:C.texto}}>
                  <input type="checkbox" checked={mostrarDir} onChange={e=>setMostrarDir(e.target.checked)}/>
                  Mostrar mi dirección a las empresas
                </label>
                <div style={{fontSize:13,color:C.textoSuave,marginTop:8}}>Tu nombre, barrio y ciudad siempre se muestran. La dirección, aunque esté apagada, se comparte con la empresa que elijas cuando aceptes su presupuesto (para coordinar la entrega).</div>
              </div>
            )}
            <div style={{marginBottom:14}}>
              <label style={S.label}>Correo electrónico</label>
              <input style={{...S.input,background:"#EDE7D5",color:C.textoSuave}} value={usuario.email||""} disabled/>
              <div style={{fontSize:13,color:C.textoSuave,marginTop:5}}>El correo de acceso no puede modificarse desde acá. Si lo escribiste mal, escribí a carpinteriavetaraiz@gmail.com.</div>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:4}}>
              <div style={{flex:"0 0 130px"}}>
                <label style={S.label}>Documento</label>
                <select style={S.input} value={tipoDoc} onChange={e=>setTipoDoc(e.target.value)}>
                  <option value="DNI">DNI</option>
                  <option value="CUIT">CUIT</option>
                </select>
              </div>
              <div style={{flex:1,minWidth:160}}>
                <label style={S.label}>Número</label>
                <input style={S.input} value={documento} onChange={e=>setDocumento(e.target.value)}/>
              </div>
            </div>
            {msg(okPriv,"ok")} {msg(errPriv,"err")}
            <button style={{...S.btn("gold"),marginTop:16,width:"100%",justifyContent:"center"}} onClick={guardarPrivado} disabled={guardandoPriv}>{guardandoPriv?"Guardando...":"Guardar cambios"}</button>
          </div>

          <div style={S.card}>
            <div style={S.cardTitle}>Cambiar contraseña</div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Contraseña actual</label>
              <input type={verPass?"text":"password"} style={S.input} value={passActual} onChange={e=>setPassActual(e.target.value)}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Nueva contraseña</label>
              <div style={{position:"relative"}}>
                <input type={verPass?"text":"password"} style={{...S.input,paddingRight:64}} value={pass1} onChange={e=>setPass1(e.target.value)} placeholder="Mínimo 6 caracteres"/>
                <button type="button" onClick={()=>setVerPass(v=>!v)} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,color:C.textoSuave,padding:"6px 8px",fontFamily:"'Lato',sans-serif"}}>{verPass?"🙈 Ocultar":"👁 Ver"}</button>
              </div>
            </div>
            <div style={{marginBottom:4}}>
              <label style={S.label}>Repetir contraseña</label>
              <input type={verPass?"text":"password"} style={S.input} value={pass2} onChange={e=>setPass2(e.target.value)}/>
            </div>
            {msg(okPass,"ok")} {msg(errPass,"err")}
            <button style={{...S.btn("dark"),marginTop:16,width:"100%",justifyContent:"center"}} onClick={cambiarPass} disabled={guardandoPass}>{guardandoPass?"Guardando...":"Cambiar contraseña"}</button>
          </div>

          <div style={{...S.card,borderColor:C.error+"55"}}>
            <div style={{...S.cardTitle,color:C.error}}>Dar de baja</div>
            <div style={{fontSize:14,color:C.textoSuave,marginBottom:14}}>Al dar de baja tu cuenta no vas a poder volver a ingresar con ella. Solo la administración puede reactivarla.</div>
            <button style={{...S.btn("ghost"),width:"100%",justifyContent:"center",color:C.error,borderColor:C.error}} onClick={onDarDeBaja}>🚫 Dar de baja mi cuenta</button>
          </div>
        </div>
      )}

      {solapa==="publico"&&!esCliente&&(
        <div>
          <div style={S.card}>
            <div style={S.cardTitle}>Perfil público de la empresa</div>
            <div style={{fontSize:14,color:C.textoSuave,marginBottom:16}}>Estos datos se muestran junto a tus presupuestos para que los clientes conozcan tu trabajo.</div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Instagram</label>
              <input style={S.input} value={instagram} onChange={e=>setInstagram(e.target.value)} placeholder="@tuempresa"/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>TikTok</label>
              <input style={S.input} value={tiktok} onChange={e=>setTiktok(e.target.value)} placeholder="@tuempresa"/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Email de contacto</label>
              <input style={S.input} value={emailEmpresa} onChange={e=>setEmailEmpresa(e.target.value)} placeholder="contacto@tuempresa.com"/>
            </div>
            <div style={{marginBottom:4}}>
              <label style={S.label}>Página web</label>
              <input style={S.input} value={web} onChange={e=>setWeb(e.target.value)} placeholder="www.tuempresa.com"/>
            </div>
            {msg(okPub,"ok")} {msg(errPub,"err")}
            <button style={{...S.btn("gold"),marginTop:16,width:"100%",justifyContent:"center"}} onClick={guardarPublico} disabled={guardandoPub}>{guardandoPub?"Guardando...":"Guardar cambios"}</button>
          </div>

          <div style={S.card}>
            <div style={S.cardTitle}>🛠️ Trabajos realizados</div>
            <div style={{fontSize:14,color:C.textoSuave,marginBottom:12}}>Mostrá hasta 3 fotos de tus trabajos. Forman parte de tu presentación profesional.</div>
            {procFoto&&<div style={{fontSize:15,color:C.textoSuave,marginBottom:8}}>⟳ Procesando imagen...</div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[0,1,2].map(i=>(
                <div key={i} style={{width:"30%",minWidth:100,flexGrow:1}}>
                  {fotos[i]?(
                    <div>
                      <img src={fotos[i]} alt={"trabajo "+(i+1)} style={{width:"100%",height:110,objectFit:"cover",borderRadius:8,border:`1px solid ${C.borde}`}}/>
                      <button onClick={()=>quitarFoto(i)} style={{...S.btn("ghost"),width:"100%",justifyContent:"center",fontSize:14,marginTop:4,padding:"6px",minHeight:"auto"}}>🗑️ Quitar</button>
                    </div>
                  ):(
                    <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:110,border:`2px dashed ${C.borde}`,borderRadius:8,cursor:"pointer",color:C.textoSuave,fontSize:14}}>
                      <span style={{fontSize:26}}>＋</span>
                      <span>Foto {i+1}</span>
                      <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{subirFoto(i,e.target.files[0]);e.target.value="";}}/>
                    </label>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [sesion,setSesion]=useState(null);
  const [navTab,setNavTab]=useState("principal");
  const [notifMsg,setNotifMsg]=useState("");
  const [mostrarBienvenida,setMostrarBienvenida]=useState(true);
  const [menuAbierto,setMenuAbierto]=useState(false);
  const [enMiCuenta,setEnMiCuenta]=useState(false);

  const actualizarUsuario=(campos)=>{
    setSesion(s=>s?{...s,usuario:{...s.usuario,...campos}}:s);
  };

  useEffect(()=>{
    try{
      const s=localStorage.getItem("encastre_sesion");
      if(s){ const ses=JSON.parse(s); setSesion(ses); db.setSesion(ses); }
    }catch{}
    const vencida=()=>{
      setSesion(null);
      try{localStorage.removeItem("encastre_sesion");}catch{}
      alert("Tu sesión venció. Por favor, iniciá sesión de nuevo.");
    };
    window.addEventListener("encastre-sesion-vencida",vencida);
    return ()=>window.removeEventListener("encastre-sesion-vencida",vencida);
  },[]);

  const handleAuth=(s)=>{
    setSesion(s);
    db.setSesion(s);
    try{localStorage.setItem("encastre_sesion",JSON.stringify(s));}catch{}
    setNavTab("principal");
  };

  const cerrar=async()=>{
    try{await db.signOut(sesion?.token);}catch{}
    db.limpiarSesion();
    setSesion(null);
    try{localStorage.removeItem("encastre_sesion");}catch{}
  };

  const darDeBaja=async()=>{
    if(!window.confirm("¿Seguro que querés dar de baja tu cuenta? No vas a poder volver a ingresar con ella. Solo la administración puede reactivarla."))return;
    try{
      await db.update("usuarios",{activo:false},`id=eq.${sesion?.usuario?.id}`);
    }catch(e){alert("No se pudo dar de baja: "+(e.message||"revisá tu conexión"));return;}
    await cerrar();
    setMostrarBienvenida(true);
    alert("Tu cuenta fue dada de baja. ¡Gracias por haber sido parte de Encastre!");
  };

  if(mostrarBienvenida&&!sesion) return <PantallaBienvenida onEntrar={()=>setMostrarBienvenida(false)}/>;
  if(!sesion) return <AuthScreen onAuth={handleAuth}/>;

  const {usuario}=sesion;
  const EMOJIS={cliente:"🪑",carpinteria:"🔨",aserradero:"🪵",flete:"🚚",ferreteria:"🔩",pintureria:"🎨"};
  const navPrincipal=usuario.tipo==="cliente"?"🪑 Mis pedidos":usuario.tipo==="carpinteria"?"🔨 Pedidos":usuario.tipo==="aserradero"?"🪵 Pedidos":usuario.tipo==="ferreteria"?"🔩 Pedidos":usuario.tipo==="pintureria"?"🎨 Pedidos":"🚚 Pedidos";

  return(
    <div style={S.app}>
      <Notif msg={notifMsg} onClose={()=>setNotifMsg("")}/>

      {/* TOPBAR */}
      <div style={S.topbar}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <img src={LOGO_B64} alt="Encastre" style={{width:46,height:46,objectFit:"contain",borderRadius:6}}/>
          <div className="encastre-topbar-brand" style={{alignItems:"center",textAlign:"center"}}>
            <div className="encastre-logo-name">ENCASTRE</div>
            <span className="encastre-logo-sub">La Comunidad de la Madera</span>
          </div>
        </div>
        <nav style={{display:"flex",gap:6}}>
          {[["principal",navPrincipal],["flete","🚚 Fletes"]].map(([id,l])=>(
            <button key={id} style={{background:navTab===id?C.acento:"transparent",color:navTab===id?C.marron:C.suave,border:navTab===id?"none":`1px solid ${C.acento}44`,borderRadius:8,padding:"10px 20px",cursor:"pointer",fontSize:18,fontWeight:700,fontFamily:"'Lato',sans-serif",transition:"all .15s"}} onClick={()=>setNavTab(id)}>{l}</button>
          ))}
        </nav>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,color:C.crema,fontWeight:700}}>{EMOJIS[usuario.tipo]} {usuario.nombre}</div>
            <div style={{fontSize:13,color:C.acento,textTransform:"uppercase",letterSpacing:.5}}>{usuario.tipo}</div>
          </div>
          <div style={{position:"relative"}}>
            <button aria-label="Menú" style={{background:"transparent",color:C.suave,border:`1px solid ${C.suave}44`,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:24,fontWeight:700,lineHeight:1,fontFamily:"'Lato',sans-serif"}} onClick={()=>setMenuAbierto(v=>!v)}>⋮</button>
            {menuAbierto&&(
              <>
                <div onClick={()=>setMenuAbierto(false)} style={{position:"fixed",inset:0,zIndex:200}}/>
                <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:C.card,border:`1px solid ${C.borde}`,borderRadius:10,boxShadow:"0 6px 24px #5C2E0A44",zIndex:201,minWidth:190,overflow:"hidden"}}>
                  <button style={{display:"block",width:"100%",textAlign:"left",background:"transparent",border:"none",padding:"14px 18px",cursor:"pointer",fontSize:16,fontWeight:700,color:C.marron,fontFamily:"'Lato',sans-serif"}} onClick={()=>{setEnMiCuenta(true);setMenuAbierto(false);}}>👤 Mi cuenta</button>
                  <button style={{display:"block",width:"100%",textAlign:"left",background:"transparent",border:"none",borderTop:`1px solid ${C.borde}`,padding:"14px 18px",cursor:"pointer",fontSize:16,fontWeight:700,color:C.marron,fontFamily:"'Lato',sans-serif"}} onClick={()=>{setMenuAbierto(false);cerrar();setMostrarBienvenida(true);}}>← Salir</button>
                </div>
              </>
            )}
          </div>
        </div>
      </div>

      {/* CONTENIDO */}
      <div style={S.main}>
        {enMiCuenta ? (
          <MiCuenta usuario={usuario} onCerrar={()=>setEnMiCuenta(false)} onActualizar={actualizarUsuario} onDarDeBaja={darDeBaja}/>
        ) : (
          <>
            {navTab==="principal"&&usuario.tipo==="cliente"&&<VistaCliente usuario={usuario} notif={setNotifMsg}/>}
            {navTab==="principal"&&usuario.tipo==="carpinteria"&&<VistaCarpinteria usuario={usuario} notif={setNotifMsg}/>}
            {navTab==="principal"&&usuario.tipo==="aserradero"&&<VistaAserradero usuario={usuario} notif={setNotifMsg}/>}
            {navTab==="principal"&&usuario.tipo==="flete"&&<VistaFlete usuario={usuario} notif={setNotifMsg}/>}
            {navTab==="principal"&&usuario.tipo==="ferreteria"&&<VistaFerreteria usuario={usuario} notif={setNotifMsg}/>}
            {navTab==="principal"&&usuario.tipo==="pintureria"&&<VistaPintureria usuario={usuario} notif={setNotifMsg}/>}
            {navTab==="flete"&&<VistaFlete usuario={usuario} notif={setNotifMsg}/>}
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
