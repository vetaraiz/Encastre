    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    ::-webkit-scrollbar { width:6px; }

    /* TAMAÑOS COHERENTES */
    #root * { box-sizing: border-box; }
    #root input, #root textarea, #root select { 
      font-size: 17px; 
    }
    #root button { 
      min-height: 48px;
    }
    /* Topbar: logo arriba, ENCASTRE abajo, eslogan abajo */
    .encastre-topbar-brand {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      line-height: 1.25 !important;
    }
    .encastre-logo-name {
      font-size: 22px !important;
      font-weight: 800 !important;
      color: #F0EDD8 !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
    }
    .encastre-logo-sub {
      font-size: 12px !important;
      color: #C4892A !important;
      text-transform: uppercase !important;
      letter-spacing: 2px !important;
    }
    ::-webkit-scrollbar-track { background:#F0EDD8; }
    ::-webkit-scrollbar-thumb { background:#C4892A66; border-radius:3px; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .fade { animation: fadeIn .3s ease; }

    /* ═══ GLOBAL SIZE OVERRIDES ═══ */
    body { font-size: 16px; }
    input, textarea, select { font-size: 15px !important; padding: 10px 13px !important; }
    button { font-size: 14px !important; }

    /* MOBILE RESPONSIVE */
    @media (max-width: 640px) {
      /* Inputs más grandes para touch */
      input, textarea, select { font-size: 16px !important; }
      
      /* Cards con menos padding */
      .card-mobile { padding: 12px !important; }

      /* Botones con altura mínima para touch */
      button { min-height: 38px; }

      /* Ocultar subtítulo topbar en mobile */
      .logo-sub-mobile { display: none; }

      /* Imagen logo más pequeña en topbar */
      .logo-img-mobile { width: 34px !important; height: 34px !important; }

      /* Tabs con scroll horizontal */
      .tabs-mobile { 
        overflow-x: auto; 
        white-space: nowrap; 
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
      }
      .tabs-mobile button { 
        display: inline-flex !important;
        white-space: nowrap;
      }

      /* Row en columna en mobile */
      .row-mobile { flex-direction: column !important; }
    }

// ─── PRESUPUESTOS: cálculo de totales ───────────────────────────────────────
const nmb = v => { const n=Number(v); return isFinite(n)?n:0; };
const fmtPeso = v => "$ "+nmb(v).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:2});
// items: [{descripcion,precio,cantidad}] ; opts: {usarDesc,descTipo,descValor,usarIva,ivaPct}
function calcularPresup(items, opts){
  const filas=(items||[]).map(it=>({...it, importe: nmb(it.precio)*nmb(it.cantidad)}));
  const subtotal=filas.reduce((a,f)=>a+f.importe,0);
  let descuento=0;
  if(opts&&opts.usarDesc){
    descuento = opts.descTipo==="porcentaje" ? subtotal*(nmb(opts.descValor)/100) : nmb(opts.descValor);
  }
  if(descuento>subtotal) descuento=subtotal;
  const baseImponible=subtotal-descuento;
  const iva = (opts&&opts.usarIva) ? baseImponible*(nmb(opts.ivaPct)/100) : 0;
  const total=baseImponible+iva;
  return {filas, subtotal, descuento, baseImponible, iva, total};
}

}
