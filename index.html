// ─── AUTH ─────────────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [modo,setModo]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [verPass,setVerPass]=useState(false);
  const [nombre,setNombre]=useState("");
  const [tipo,setTipo]=useState("");
  const [ciudad,setCiudad]=useState("");
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [cargando,setCargando]=useState(false);
  const [entidad,setEntidad]=useState("");
  const [documento,setDocumento]=useState("");

  const soloDigitos=s=>(s||"").replace(/\D/g,"");
  const validarCUIT=(raw)=>{
    const c=soloDigitos(raw);
    if(c.length!==11) return false;
    const mult=[5,4,3,2,7,6,5,4,3,2];
    let suma=0; for(let i=0;i<10;i++) suma+=parseInt(c[i],10)*mult[i];
    let ver=11-(suma%11); if(ver===11) ver=0;
    if(ver===10) return false;
    return ver===parseInt(c[10],10);
  };
  const validarDNI=(raw)=>{ const d=soloDigitos(raw); return d.length>=7&&d.length<=8; };

  const tipos=[
    {id:"cliente",emoji:"🪑",label:"Consumidor Final",desc:"Quiero encargar muebles o construcciones en madera"},
    {id:"carpinteria",emoji:"🔨",label:"Carpintería",desc:"Recibo pedidos y presupuesto trabajos"},
    {id:"aserradero",emoji:"🪵",label:"Aserradero",desc:"Vendo madera a carpinterías y negocios"},
    {id:"flete",emoji:"🚚",label:"Flete / Transporte",desc:"Traslado muebles y materiales"},
    {id:"ferreteria",emoji:"🔩",label:"Ferretería / Herrajes",desc:"Vendo herrajes, bisagras y materiales a carpinterías"},
    {id:"pintureria",emoji:"🎨",label:"Pinturería",desc:"Vendo pinturas, barnices, lacas y esmaltes a carpinterías"},
  ];

  const submit=async()=>{
    setErr("");setOk("");setCargando(true);
    try{
      if(modo==="registro"){
        if(!tipo||!nombre){setErr("Completá todos los campos");setCargando(false);return;}
        if(!entidad){setErr("Elegí si sos empresa o persona");setCargando(false);return;}
        if(entidad==="empresa"&&!validarCUIT(documento)){setErr("El CUIT no parece válido. Revisá que tenga los 11 números correctos.");setCargando(false);return;}
        if(entidad==="persona"&&!validarDNI(documento)){setErr("El DNI no parece válido. Debe tener 7 u 8 números, sin puntos.");setCargando(false);return;}
        const tipoDoc=entidad==="empresa"?"CUIT":"DNI";
        const docLimpio=soloDigitos(documento);
        const signUpRes=await db.signUp(email.trim().toLowerCase(),pass);
        const error=signUpRes.error;
        if(error){setErr(error.message||"Error al registrar");setCargando(false);return;}
        let tokenReg=signUpRes.access_token?{token:signUpRes.access_token,refresh:signUpRes.refresh_token,expira:Date.now()+((signUpRes.expires_in||3600)*1000)}:null;
        let userId=(signUpRes.data?.user||signUpRes.user||signUpRes)?.id||signUpRes?.id;
        if(!tokenReg){
          // El mail ya tenía credencial (intento anterior). Probamos entrar con esa clave para completar la ficha.
          const reIn=await db.signIn(email.trim().toLowerCase(),pass);
          if(reIn.access_token){
            tokenReg={token:reIn.access_token,refresh:reIn.refresh_token,expira:Date.now()+((reIn.expires_in||3600)*1000)};
            userId=reIn.user?.id||userId;
            // Si ya tiene ficha, no hay nada que crear: que inicie sesión directamente
            db.setSesion(tokenReg);
            try{
              const ya=await db.select("usuarios",`?auth_id=eq.${userId}&limit=1`);
              if(ya.length>0){ db.limpiarSesion(); setOk("Esa cuenta ya existe y está completa. Iniciá sesión."); setModo("login"); setCargando(false); return; }
            }catch{}
          } else {
            setErr("Este email ya está registrado. Iniciá sesión, o usá '¿Olvidaste tu contraseña?' para recuperarla.");
            setCargando(false);
            return;
          }
        }
        // Presentarse ante la base con la credencial, para poder crear la propia ficha
        db.setSesion(tokenReg);
        const emailLimpio=email.trim().toLowerCase();
        try{
          if(!userId){
            await db.insert("usuarios",{tipo,nombre,email:emailLimpio,ciudad,tipo_documento:tipoDoc,documento:docLimpio});
          } else {
            await db.insert("usuarios",{auth_id:userId,tipo,nombre,email:emailLimpio,ciudad,tipo_documento:tipoDoc,documento:docLimpio});
          }
        } finally { db.limpiarSesion(); }
        setOk("¡Cuenta creada! Ahora iniciá sesión.");
        setModo("login");
      }else{
        const signInRes=await db.signIn(email.trim().toLowerCase(),pass);
        const access_token=signInRes.access_token;
        const error=signInRes.error;
        if(error||!access_token){setErr("Email o contraseña incorrectos");setCargando(false);return;}
        // Presentarse ante la base antes de buscar el perfil (necesario con la seguridad activada)
        db.setSesion({token:access_token,refresh:signInRes.refresh_token,expira:Date.now()+((signInRes.expires_in||3600)*1000)});
        const uidAuth=signInRes.user?.id;
        let perfiles=[];
        if(uidAuth){ try{ perfiles=await db.select("usuarios",`?auth_id=eq.${uidAuth}&limit=1`); }catch{} }
        if(perfiles.length===0){ try{ perfiles=await db.select("usuarios",`?email=eq.${encodeURIComponent(email.trim().toLowerCase())}&limit=1`); }catch{} }
        if(perfiles.length===0){db.limpiarSesion();setErr("Perfil no encontrado");setCargando(false);return;}
        if(perfiles[0].activo===false){db.limpiarSesion();setErr("Esta cuenta fue dada de baja. Escribí a carpinteriavetaraiz@gmail.com si querés reactivarla.");setCargando(false);return;}
        console.log("Usuario al login:",perfiles[0]);
        onAuth({token:access_token,refresh:signInRes.refresh_token,expira:Date.now()+((signInRes.expires_in||3600)*1000),usuario:perfiles[0]});
      }
    }catch(e){setErr("Error: "+(e.message||"Revisá tu conexión"));}
    setCargando(false);
  };

  return(
    <div style={{...S.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,background:`linear-gradient(160deg,${C.crema} 60%,${C.suave} 100%)`}}>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:32}}>
        <img src={LOGO_B64} alt="Encastre" style={{width:260,height:164,objectFit:"contain",marginBottom:4}}/>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:40,fontWeight:800,color:C.marron,letterSpacing:3,textTransform:"uppercase"}}>ENCASTRE</div>
        <div style={{fontSize:17,color:C.textoSuave,letterSpacing:3,textTransform:"uppercase",marginTop:1}}>La Comunidad de la Madera</div>
        <div style={{width:60,height:3,background:`linear-gradient(90deg,${C.acento},${C.marron})`,borderRadius:2,margin:"12px auto 0"}}/>
      </div>

      <div style={{...S.card,width:"100%",maxWidth:420,padding:28}}>
        <div style={{display:"flex",gap:8,marginBottom:22}}>
          {["login","registro"].map(m=>(
            <button key={m} style={{...S.btn(modo===m?"dark":"ghost"),flex:1,justifyContent:"center",fontSize:16}} onClick={()=>setModo(m)}>
              {m==="login"?"Iniciar sesión":"Crear cuenta"}
            </button>
          ))}
        </div>

        {modo==="registro"&&(
          <>
            <label style={S.label}>Soy...</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {tipos.map(t=>(
                <button key={t.id} style={{...S.tag(tipo===t.id),padding:"10px 8px",textAlign:"center",lineHeight:1.4,height:"auto"}} onClick={()=>setTipo(t.id)}>
                  <div style={{fontSize:21,marginBottom:4}}>{t.emoji}</div>
                  <div style={{fontWeight:700,fontSize:16}}>{t.label}</div>
                  <div style={{fontSize:17,opacity:.7,marginTop:2}}>{t.desc}</div>
                </button>
              ))}
            </div>
            <div style={{marginBottom:12}}>
              <label style={S.label}>Nombre / Razón social</label>
              <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Tu nombre o el de tu negocio" style={S.input}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={S.label}>Ciudad</label>
              <input value={ciudad} onChange={e=>setCiudad(e.target.value)} placeholder="Ej: Buenos Aires" style={S.input}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={S.label}>¿Empresa o persona?</label>
              <div style={{display:"flex",gap:8}}>
                <button type="button" style={{...S.tag(entidad==="empresa"),flex:1,justifyContent:"center",padding:"10px"}} onClick={()=>{setEntidad("empresa");setDocumento("");}}>🏢 Empresa</button>
                <button type="button" style={{...S.tag(entidad==="persona"),flex:1,justifyContent:"center",padding:"10px"}} onClick={()=>{setEntidad("persona");setDocumento("");}}>🧑 Persona</button>
              </div>
            </div>
            {entidad&&(
              <div style={{marginBottom:12}}>
                <label style={S.label}>{entidad==="empresa"?"CUIT (11 números)":"DNI (sin puntos)"}</label>
                <input type="tel" inputMode="numeric" value={documento} onChange={e=>setDocumento(e.target.value)} placeholder={entidad==="empresa"?"Ej: 30712345678":"Ej: 28123456"} style={S.input}/>
                <div style={{fontSize:14,color:C.textoSuave,marginTop:4}}>🔒 Tu documento es privado: solo lo ve la administración, nunca otros usuarios.</div>
              </div>
            )}
          </>
        )}

        <div style={{marginBottom:12}}>
          <label style={S.label}>Email</label>
          <input type="email" autoComplete="username" autoCapitalize="none" autoCorrect="off" spellCheck="false" value={email} onChange={e=>setEmail(e.target.value.replace(/\s+/g,""))} placeholder="tu@email.com" style={S.input}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={S.label}>Contraseña</label>
          <div style={{position:"relative"}}>
            <input type={verPass?"text":"password"} autoComplete={modo==="registro"?"new-password":"current-password"} value={pass} onChange={e=>setPass(e.target.value)} placeholder="Mínimo 6 caracteres" style={{...S.input,paddingRight:46}} onKeyDown={e=>{if(e.key==="Enter")submit();}}/>
            <button type="button" onClick={()=>setVerPass(v=>!v)} aria-label="Mostrar u ocultar contraseña" style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",minHeight:"auto",background:"none",border:"none",cursor:"pointer",fontSize:20,padding:6,lineHeight:1}}>{verPass?"🙈":"👁️"}</button>
          </div>
        </div>

        {err&&<div style={{fontSize:17,color:C.rojo,background:C.rojo+"11",border:`1px solid ${C.rojo}33`,borderRadius:7,padding:"8px 12px",marginBottom:12}}>{err}</div>}
        {ok&&<div style={{fontSize:17,color:C.verde,background:C.verde+"11",border:`1px solid ${C.verde}33`,borderRadius:7,padding:"8px 12px",marginBottom:12}}>✅ {ok}</div>}

        <button style={{...S.btn("dark"),width:"100%",justifyContent:"center",fontSize:17,padding:"11px"}} onClick={submit} disabled={cargando}>
          {cargando?"⟳ Procesando...":(modo==="login"?"Entrar →":"Crear cuenta →")}
        </button>
        {modo==="login"&&(
          <div style={{textAlign:"center",marginTop:12}}>
            <button onClick={async()=>{
              if(!email){setErr("Escribí tu email primero");return;}
              try{
                await fetch(`${SUPABASE_URL}/auth/v1/recover`,{method:"POST",headers:{"apikey":SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email:email.trim().toLowerCase()})});
                setOk("✅ Te enviamos un email para restablecer tu contraseña");
              }catch{setErr("Error al enviar el email");}
            }} style={{background:"none",border:"none",color:C.textoSuave,fontSize:17,cursor:"pointer",textDecoration:"underline"}}>
              ¿Olvidaste tu contraseña?
            </button>
          </div>
        )}
      </div>

      <div style={{marginTop:20,fontSize:17,color:C.textoSuave,letterSpacing:.5}}>Hecho con 🌿 para el oficio de la madera</div>
      <div style={{marginTop:6,fontSize:13,color:"#B8A99A"}}>v2026-07-09.4</div>
    </div>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function Chat({pedidoId,tipoPedido,miUsuario,otroUsuario}){
  const [msgs,setMsgs]=useState([]);
  const [txt,setTxt]=useState("");
  const [bloqueoMio,setBloqueoMio]=useState(null);
  const [meBloquearon,setMeBloquearon]=useState(false);
  const endRef=useRef(null);
  const otroId=otroUsuario?.id;

  const cargar=useCallback(async()=>{
    try{
      const filtroPareja=otroId?`&or=(and(de_usuario_id.eq.${miUsuario.id},para_usuario_id.eq.${otroId}),and(de_usuario_id.eq.${otroId},para_usuario_id.eq.${miUsuario.id}))`:"";
      const d=await db.select("mensajes",`?pedido_id=eq.${pedidoId}&tipo_pedido=eq.${tipoPedido}${filtroPareja}&order=created_at.asc`);
      setMsgs(d);
    }catch{}
  },[pedidoId,tipoPedido,otroId,miUsuario.id]);

  const verBloqueo=useCallback(async()=>{
    if(!otroId)return;
    try{
      const d=await db.select("bloqueos",`?bloqueador_id=in.(${miUsuario.id},${otroId})&bloqueado_id=in.(${miUsuario.id},${otroId})`);
      setBloqueoMio(d.find(b=>b.bloqueador_id===miUsuario.id&&b.bloqueado_id===otroId)||null);
      setMeBloquearon(d.some(b=>b.bloqueador_id===otroId&&b.bloqueado_id===miUsuario.id));
    }catch{}
  },[otroId,miUsuario.id]);

  useEffect(()=>{cargar();verBloqueo();const t=setInterval(cargar,10000);return()=>clearInterval(t);},[cargar,verBloqueo]);

  const bloqueado=!!bloqueoMio||meBloquearon;

  const enviar=async()=>{
    if(!txt.trim()||bloqueado)return;
    const m={pedido_id:pedidoId,tipo_pedido:tipoPedido,de_usuario_id:miUsuario.id,para_usuario_id:otroId,texto:txt};
    setTxt("");
    try{await db.insert("mensajes",m);await cargar();}catch{}
  };

  const bloquear=async()=>{
    if(!otroId)return;
    if(!window.confirm("¿Bloquear a este usuario? No vas a poder intercambiar mensajes con él. Podés desbloquearlo cuando quieras."))return;
    try{ await db.insert("bloqueos",{bloqueador_id:miUsuario.id,bloqueado_id:otroId}); await verBloqueo(); }catch(e){alert("No se pudo bloquear: "+(e.message||""));}
  };
  const desbloquear=async()=>{
    if(!bloqueoMio)return;
    try{ await db.remove("bloqueos",`id=eq.${bloqueoMio.id}`); await verBloqueo(); }catch(e){alert("No se pudo desbloquear: "+(e.message||""));}
  };

  return(
    <div style={{background:C.input,border:`1px solid ${C.borde}`,borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",background:C.suave,borderBottom:`1px solid ${C.borde}`}}>
        <span style={{fontSize:17,color:C.textoSuave,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>💬 Chat directo</span>
        {otroId&&!meBloquearon&&(bloqueoMio
          ? <button onClick={desbloquear} style={{...S.btn("ghost"),fontSize:14,padding:"4px 10px",minHeight:"auto"}}>Desbloquear</button>
          : <button onClick={bloquear} style={{background:"none",border:`1px solid ${C.borde}`,color:C.textoSuave,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:14,minHeight:"auto"}}>🚫 Bloquear</button>
        )}
      </div>
      {meBloquearon?(
        <div style={{padding:18,textAlign:"center",color:C.textoSuave,fontSize:16}}>🚫 Este usuario te bloqueó. No podés enviarle mensajes.</div>
      ):bloqueoMio?(
        <div style={{padding:18,textAlign:"center",color:C.textoSuave,fontSize:16}}>🚫 Bloqueaste a este usuario. Tocá "Desbloquear" para volver a chatear.</div>
      ):(
      <div>
      <div style={{maxHeight:180,overflowY:"auto",padding:"10px 14px"}}>
        {msgs.length===0&&<div style={{color:C.textoSuave,fontSize:17,textAlign:"center",padding:16,fontStyle:"italic"}}>Sin mensajes aún...</div>}
        {msgs.map((m,i)=>{
          const propio=m.de_usuario_id===miUsuario.id;
          return(
            <div key={i} style={{marginBottom:8,display:"flex",flexDirection:propio?"row-reverse":"row",gap:6}}>
              <div style={{background:propio?C.marron:C.card,border:`1px solid ${propio?C.marron:C.borde}`,borderRadius:8,padding:"6px 11px",maxWidth:"78%"}}>
                <div style={{fontSize:17,color:propio?C.acento:C.textoSuave,marginBottom:2}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                <div style={{fontSize:17,color:propio?C.crema:C.texto}}>{m.texto}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8,padding:"8px 14px",borderTop:`1px solid ${C.borde}`,background:C.card}}>
        <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")enviar();}} placeholder="Escribí tu mensaje..." style={{...S.input,flex:1}}/>
        <button style={S.btn("dark")} onClick={enviar}>Enviar</button>
      </div>
      </div>
      )}
    </div>
  );
}

// ─── CALIFICACIÓN ─────────────────────────────────────────────────────────────
function Calificar({deUsuario,paraUsuario,pedidoId,califs=[]}){
  const [open,setOpen]=useState(false);
  const [stars,setStars]=useState(0);
  const [coment,setComent]=useState("");
  const [enviado,setEnviado]=useState(false);

  const enviar=async()=>{
    if(!stars)return;
    try{
      await db.insert("calificaciones",{de_usuario_id:deUsuario.id,para_usuario_id:paraUsuario.id,pedido_id:pedidoId,estrellas:stars,comentario:coment});
      setEnviado(true);setOpen(false);
    }catch{}
  };

  return(
    <div style={{marginTop:12}}>
      {califs.map((c,i)=>(
        <div key={i} style={{fontSize:17,color:C.textoSuave,marginBottom:4}}>
          <Stars v={c.estrellas}/> — {c.comentario}
          {c.respuesta&&<div style={{fontSize:17,color:C.textoSuave,marginLeft:12,marginTop:2,fontStyle:"italic"}}>↩ {c.respuesta}</div>}
        </div>
      ))}
      {!enviado&&(
        <div>
          <button style={{...S.btn("ghost"),fontSize:17,padding:"5px 12px"}} onClick={()=>setOpen(!open)}>{open?"Cerrar":"⭐ Calificar"}</button>
          {open&&(
            <div style={{marginTop:10,background:C.input,borderRadius:8,padding:12,border:`1px solid ${C.borde}`}} className="fade">
              <div style={{display:"flex",gap:4,marginBottom:8}}>
                {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setStars(n)} style={{background:"none",border:"none",cursor:"pointer",fontSize:23,color:n<=stars?C.acento:C.borde}}>★</button>)}
              </div>
              <textarea value={coment} onChange={e=>setComent(e.target.value)} placeholder="Contá tu experiencia..." style={{...S.input,minHeight:56,resize:"vertical"}}/>
              <button style={{...S.btn("dark"),marginTop:8,fontSize:16}} onClick={enviar}>Enviar calificación</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── NUEVO PEDIDO ─────────────────────────────────────────────────────────────
function NuevoPedido({usuario,onGuardar,onCancelar,notif}){
  const [f,setF]=useState({descripcion:"",alto:"",ancho:"",profundidad:"",material:"",especie:"",terminacion:"",color:"",notasCroquis:"",usaCroquis:false,tieneCajones:"No",cantidadCajones:"",medidasCajones:"",croquisImg:"",fechaLimite:""});
  const [procImg,setProcImg]=useState(false);
  const [intento,setIntento]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  // Fechas en horario LOCAL (evita el corrimiento de un día que daba toISOString en UTC-3)
  const aISO=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const masDias=n=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+n);return aISO(d);};
  const minFecha=masDias(1); // mínimo: mañana (un pedido no puede vencer hoy)
  // Lista de lo que falta completar, para marcar en rojo y avisar
  const faltan=()=>{
    const l=[];
    if(!f.descripcion)l.push("qué necesitás");
    if(!f.alto)l.push("el alto");
    if(!f.ancho)l.push("el ancho");
    if(!f.profundidad)l.push("la profundidad");
    if(!f.material)l.push("el material");
    if(!f.terminacion)l.push("la terminación");
    return l;
  };
  const errBorde=(cond)=>(intento&&cond)?{border:`2px solid ${C.rojo}`}:{};
  const AvisoFalta=({cond,texto})=>(intento&&cond)?<div style={{color:C.rojo,fontSize:15,marginTop:4,fontWeight:600}}>⚠️ {texto||"Falta completar este campo"}</div>:null;

  // Toma una foto del croquis, la achica y la convierte a texto para guardarla en la base
  const elegirImagenCroquis=(file)=>{
    if(!file) return;
    if(!file.type.startsWith("image/")){ alert("Por ahora se puede adjuntar solo una foto/imagen (JPG o PNG)."); return; }
    setProcImg(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const maxLado=900;
        let w=img.width, h=img.height;
        if(w>h && w>maxLado){ h=Math.round(h*maxLado/w); w=maxLado; }
        else if(h>=w && h>maxLado){ w=Math.round(w*maxLado/h); h=maxLado; }
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        set("croquisImg",canvas.toDataURL("image/jpeg",0.6));
        setProcImg(false);
      };
      img.onerror=()=>{ setProcImg(false); alert("No se pudo leer la imagen. Probá con una foto JPG o PNG."); };
      img.src=ev.target.result;
    };
    reader.onerror=()=>{ setProcImg(false); alert("No se pudo leer el archivo."); };
    reader.readAsDataURL(file);
  };
  const ok=f.descripcion&&f.alto&&f.ancho&&f.profundidad&&f.material&&f.terminacion;

  const guardar=async()=>{
    try{
      if(!usuario||!usuario.id){alert("Error: no se encontró tu usuario. Cerrá sesión y volvé a entrar.");return;}
      // Verificar que el usuario existe en la tabla antes de insertar
      const verificar=await db.select("usuarios",`?id=eq.${usuario.id}&limit=1`);
      if(!verificar||verificar.length===0){
        alert("Error: tu perfil no está en la base de datos. Cerrá sesión y volvé a entrar.");
        return;
      }
      await db.insert("pedidos",{cliente_id:usuario.id,descripcion:f.descripcion,alto:Number(f.alto),ancho:Number(f.ancho),profundidad:Number(f.profundidad),material:f.material,especie:f.especie||null,terminacion:f.terminacion,color:f.color,notas_croquis:f.notasCroquis||"",tiene_cajones:f.tieneCajones==="Sí",cantidad_cajones:Number(f.cantidadCajones)||0,medidas_cajones:f.medidasCajones||"",croquis_imagen:f.croquisImg||"",fecha_limite:f.fechaLimite?new Date(f.fechaLimite+"T23:59:59").toISOString():null});
      notif("¡Pedido enviado a todas las carpinterías!");
      onGuardar();
    }catch(e){alert("Error al guardar pedido: "+e.message);}
  };

  return(
    <div style={S.card} className="fade">
      <div style={S.cardTitle}>✏️ Nuevo pedido de presupuesto</div>

      <div style={{marginBottom:14}}>
        <label style={S.label}>¿Qué necesitás?</label>
        <textarea value={f.descripcion} onChange={e=>set("descripcion",e.target.value)} placeholder="Describí lo que querés hacer: ej. Mesa de comedor para 8 personas con cajón lateral..." style={{...S.input,minHeight:72,resize:"vertical",...errBorde(!f.descripcion)}}/>
        <AvisoFalta cond={!f.descripcion}/>
      </div>

      <Divider/>
      <div style={S.secTitle}>📐 Medidas en centímetros</div>
      <div style={S.row}>
        {[["alto","Alto (cm)"],["ancho","Ancho (cm)"],["profundidad","Profundidad (cm)"]].map(([k,l])=>(
          <div key={k} style={S.col()}>
            <label style={S.label}>{l}</label>
            <input type="number" value={f[k]} onChange={e=>set(k,e.target.value)} placeholder="0" style={{...S.input,...errBorde(!f[k])}}/>
            <AvisoFalta cond={!f[k]} texto="Falta esta medida"/>
            {f[k]&&<div style={{fontSize:17,color:C.textoSuave,marginTop:3,fontFamily:"monospace"}}>= {cmToMm(f[k])}mm · {cmToIn(f[k])}"</div>}
          </div>
        ))}
      </div>

      <div style={{marginTop:12}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:17,color:C.textoSuave}}>
          <input type="checkbox" checked={f.usaCroquis} onChange={e=>set("usaCroquis",e.target.checked)}/>
          Quiero adjuntar descripción de un croquis con medidas aproximadas
        </label>
        {f.usaCroquis&&<textarea value={f.notasCroquis} onChange={e=>set("notasCroquis",e.target.value)} placeholder="Describí el croquis..." style={{...S.input,minHeight:56,resize:"vertical",marginTop:8}}/>}
        {f.usaCroquis&&<div style={{marginTop:10}}>
          <label style={{...S.btn("ghost"),display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer",margin:0}}>
            📷 {f.croquisImg?"Cambiar foto del croquis":"Adjuntar foto del croquis"}
            <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{elegirImagenCroquis(e.target.files[0]); e.target.value="";}}/>
          </label>
          {procImg&&<div style={{fontSize:15,color:C.textoSuave,marginTop:6}}>⟳ Procesando imagen...</div>}
          {f.croquisImg&&<div style={{marginTop:10}}>
            <img src={f.croquisImg} alt="croquis" style={{maxWidth:"100%",maxHeight:240,borderRadius:8,border:`1px solid ${C.borde}`}}/>
            <div><button style={{...S.btn("ghost"),marginTop:6}} onClick={()=>set("croquisImg","")}>🗑️ Quitar foto</button></div>
          </div>}
        </div>}
      </div>

      <Divider/>
      <div style={S.secTitle}>🪵 Material</div>
      <AvisoFalta cond={!f.material} texto="Falta elegir un material"/>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
        {MATS.map(m=><button key={m.id} style={S.tag(f.material===m.id)} onClick={()=>{set("material",m.id);set("especie","");set("terminacion","");set("color","");}}>{m.label}</button>)}
      </div>
      {(()=>{
        const m=MATS.find(m=>m.id===f.material);
        if(!m) return null;
        if(m.especies) return(
          <div style={{marginTop:4}}>
            <div style={{fontSize:16,color:C.marron,marginBottom:6,fontWeight:600}}>¿Qué tipo de {m.label.toLowerCase()}?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {m.especies.map(e=><button key={e} style={S.tag(f.especie===e)} onClick={()=>set("especie",f.especie===e?"":e)}>{e}</button>)}
              <button style={S.tag(f.especie==="Otra / a definir")} onClick={()=>set("especie",f.especie==="Otra / a definir"?"":"Otra / a definir")}>Otra / a definir</button>
            </div>
          </div>
        );
        return <div style={{fontSize:17,color:C.textoSuave,fontStyle:"italic"}}>Ej: {m.ej}</div>;
      })()}

      <Divider/>
      <div style={S.secTitle}>🎨 Terminación / Acabado</div>
      <AvisoFalta cond={!f.terminacion} texto="Falta elegir una terminación"/>
      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
        {TERS.filter(t=>{
          const esMadera=["madera_dura","madera_semidura","madera_blanda"].includes(f.material);
          const esMelamina=["aglomerado_melamina","mdf_melamina"].includes(f.material);
          const esTablero=["aglomerado","mdf","fenolico"].includes(f.material);
          if(esMadera) return ["crudo","pintado","lacheado","enchapado"].includes(t.id);
          if(esMelamina) return ["melamina_color"].includes(t.id);
          if(esTablero) return ["crudo","pintado","lacheado","enchapado","melamina_color"].includes(t.id);
          return true;
        }).map(t=>{
          // Reset terminacion if not valid for current material
          if(f.terminacion&&f.terminacion===t.id&&false) set("terminacion","");
          return <button key={t.id} style={S.tag(f.terminacion===t.id)} onClick={()=>set("terminacion",t.id)}>{t.label}</button>;
        })}
      </div>
      {f.terminacion==="melamina_color"&&(
        <div style={{marginTop:10}}>
          <label style={S.label}>Color de melamina</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{COLORES_MEL.map(c=><button key={c} style={S.tag(f.color===c)} onClick={()=>set("color",c)}>{c}</button>)}</div>
        </div>
      )}
      {f.terminacion==="pintado"&&(
        <div style={{marginTop:10}}>
          <label style={S.label}>Color</label>
          <input value={f.color} onChange={e=>set("color",e.target.value)} placeholder="Ej: Blanco roto..." style={{...S.input,maxWidth:220}}/>
        </div>
      )}

      <div style={S.secTitle}>⏰ Fecha límite para recibir presupuestos <span style={{fontWeight:400,fontSize:15,color:C.textoSuave}}>(opcional)</span></div>
      <div style={{fontSize:15,color:C.textoSuave,marginBottom:8}}>Pasada esta fecha, las carpinterías ya no podrán cotizar. Si la dejás vacía, el pedido queda abierto sin vencimiento.</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
        {[["3 días",3],["1 semana",7],["15 días",15]].map(([lbl,d])=>{
          const fecha=masDias(d);
          const activo=f.fechaLimite===fecha;
          return <button key={d} style={{...S.btn(activo?"dark":"ghost"),fontSize:15,padding:"6px 12px"}} onClick={()=>set("fechaLimite",activo?"":fecha)}>{lbl}</button>;
        })}
        {f.fechaLimite&&<button style={{...S.btn("ghost"),fontSize:15,padding:"6px 12px",color:C.rojo,borderColor:C.rojo}} onClick={()=>set("fechaLimite","")}>✕ Sin vencimiento</button>}
      </div>
      <div style={{fontSize:15,color:C.textoSuave,margin:"4px 0 6px"}}>📆 O elegí una fecha exacta en el calendario:</div>
      <input type="date" value={f.fechaLimite} min={minFecha} onChange={e=>{const v=e.target.value; set("fechaLimite", v&&v<minFecha?minFecha:v);}} style={S.input}/>
      {f.fechaLimite&&<div style={{fontSize:15,color:C.verde,marginTop:4}}>📅 Vence el {new Date(f.fechaLimite+"T00:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}</div>}

      {intento&&!ok&&(
        <div style={{marginTop:16,padding:"10px 14px",background:"#FDECEA",border:`1px solid ${C.rojo}`,borderRadius:10,color:C.rojo,fontSize:16,fontWeight:600}}>
          ⚠️ Para enviar el pedido te falta completar: {faltan().join(", ")}.
        </div>
      )}
      <div style={{display:"flex",gap:10,marginTop:intento&&!ok?10:20}}>
        <button style={S.btn("dark")} onClick={()=>{ if(!ok){ setIntento(true); return; } guardar(); }}>📤 Enviar pedido</button>
        <button style={S.btn("ghost")} onClick={onCancelar}>Cancelar</button>
      </div>
    </div>
  );
}

// ─── VISTA CLIENTE ────────────────────────────────────────────────────────────
function VistaCliente({usuario,notif}){
  const [pedidos,setPedidos]=useState([]);
  const [vista,setVista]=useState("lista");
  const [sel,setSel]=useState(null);
  const [presups,setPresups]=useState([]);
  const [selPresup,setSelPresup]=useState(null);
  const [filtro,setFiltro]=useState("todos");

  const cargar=useCallback(async()=>{
    try{const d=await db.select("pedidos",`?cliente_id=eq.${usuario.id}&order=created_at.desc`);setPedidos(d);}catch{}
  },[usuario.id]);

  useEffect(()=>{cargar();},[cargar]);

  const enriquecerPresups=async(d)=>{
    return await Promise.all(d.map(async pr=>{
      const c=await db.select("usuarios",`?id=eq.${pr.carpinteria_id}&limit=1`);
      let items=[];
      try{ items=await db.select("presupuesto_items",`?presupuesto_id=eq.${pr.id}&order=orden.asc`); }catch{}
      return{...pr,empresa:c[0]||{},carpNombre:c[0]?.nombre||"Carpintería",carpFotos:[c[0]?.foto1,c[0]?.foto2,c[0]?.foto3].filter(Boolean),items};
    }));
  };

  const abrirPedido=async(p)=>{
    if(sel&&sel.id===p.id){ setSel(null); setPresups([]); setSelPresup(null); return; }
    setSel(p);
    setSelPresup(null);
    setPresups([]);
    try{
      const d=await db.select("presupuestos",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      setPresups(await enriquecerPresups(d));
    }catch{}
  };

  const recargarPresups=async(p)=>{
    try{
      const d=await db.select("presupuestos",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      setPresups(await enriquecerPresups(d));
    }catch{}
  };

  const aceptar=async(pr)=>{
    try{
      const ahora=new Date().toISOString();
      // 1) Aceptar el elegido
      await db.update("presupuestos",{estado:"aceptado",aceptado_at:ahora},`id=eq.${pr.id}`);
      // 2) Cerrar los demás presupuestos del mismo pedido
      await db.update("presupuestos",{estado:"cerrado"},`pedido_id=eq.${sel.id}&id=neq.${pr.id}`);
      // 3) Marcar el pedido como aceptado
      await db.update("pedidos",{estado:"aceptado"},`id=eq.${sel.id}`);
      notif("¡Presupuesto aceptado!");
      setSelPresup(null);
      cargar();
      recargarPresups(sel);
    }catch(e){alert("No se pudo aceptar: "+(e.message||"revisá tu conexión"));}
  };

  const deshacerAceptacion=async(pr)=>{
    if(!window.confirm("¿Deshacer la aceptación? El pedido vuelve a quedar abierto y las carpinterías podrán ser elegidas de nuevo."))return;
    try{
      // Reabrir: el aceptado vuelve a enviado, los cerrados vuelven a enviado, el pedido se reabre
      await db.update("presupuestos",{estado:"enviado",aceptado_at:null},`id=eq.${pr.id}`);
      await db.update("presupuestos",{estado:"enviado"},`pedido_id=eq.${sel.id}&estado=eq.cerrado`);
      await db.update("pedidos",{estado:"presupuestado"},`id=eq.${sel.id}`);
      notif("Aceptación deshecha. El pedido quedó abierto de nuevo.");
      setSelPresup(null);
      cargar();
      recargarPresups(sel);
    }catch(e){alert("No se pudo deshacer: "+(e.message||"revisá tu conexión"));}
  };

  if(vista==="nuevo") return <NuevoPedido usuario={usuario} onGuardar={()=>{cargar();setVista("lista");}} onCancelar={()=>setVista("lista")} notif={notif}/>;

  // Detalle de un presupuesto puntual (se abre dentro del pedido desplegado)
  const DetallePresup=({pr})=>(
    <div style={{marginTop:10,border:`1px solid ${C.acento}`,borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.input}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,color:C.marron,fontSize:22}}>🔨 {pr.carpNombre}</div>
        <button style={{...S.btn("ghost"),fontSize:14,padding:"4px 10px"}} onClick={()=>setSelPresup(null)}>✕ Cerrar</button>
      </div>
      <div style={{padding:12}}>
        <PresupuestoFormato
          empresa={pr.empresa||{nombre:pr.carpNombre}}
          cliente={usuario}
          items={pr.items||[]}
          opts={{descuento_tipo:pr.descuento_tipo,descuento_valor:pr.descuento_valor,iva_pct:pr.iva_pct}}
          numero={pr.numero!=null?pr.numero:""}
          fecha={pr.created_at?new Date(pr.created_at).toLocaleDateString("es-AR"):null}
          tiempoEntrega={pr.tiempo_entrega}
          esEmpresa={false}
          aceptado={pr.estado==="aceptado"}
        />
        {pr.estado==="enviado"&&(
          <div style={{marginTop:12}}>
            <button style={{...S.btn("dark"),width:"100%",justifyContent:"center"}} onClick={()=>aceptar(pr)}>✅ Aceptar presupuesto</button>
          </div>
        )}
        {pr.estado==="aceptado"&&(()=>{
          const t=pr.aceptado_at?new Date(pr.aceptado_at).getTime():null;
          const dentroDeHora = t && (Date.now()-t) < 3600000;
          return(
            <div style={{marginTop:12}}>
              <div style={{background:C.verde+"22",border:`1px solid ${C.verde}`,borderRadius:10,padding:12,textAlign:"center",marginBottom:dentroDeHora?10:0}}>
                <div style={{fontWeight:800,color:C.verde,fontSize:17}}>✅ Presupuesto aceptado</div>
              </div>
              {dentroDeHora?(
                <div>
                  <button style={{...S.btn("ghost"),width:"100%",justifyContent:"center",color:C.error,borderColor:C.error}} onClick={()=>deshacerAceptacion(pr)}>↩️ Deshacer aceptación</button>
                  <div style={{fontSize:13,color:C.textoSuave,marginTop:6,textAlign:"center"}}>Podés deshacer la aceptación hasta 1 hora después de haberla hecho. Pasado ese tiempo queda fija.</div>
                </div>
              ):(
                <div style={{fontSize:13,color:C.textoSuave,marginTop:2,textAlign:"center"}}>La aceptación es definitiva.</div>
              )}
            </div>
          );
        })()}
        <Calificar deUsuario={usuario} paraUsuario={{id:pr.carpinteria_id}} pedidoId={sel.id}/>
        {pr.carpFotos&&pr.carpFotos.length>0&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:15,color:C.textoSuave,marginBottom:6}}>🛠️ Trabajos realizados</div>
            <div style={{display:"flex",gap:8}}>
              {pr.carpFotos.map((f,j)=>(<img key={j} src={f} alt={"trabajo "+(j+1)} style={{width:"31%",height:100,objectFit:"cover",borderRadius:8,border:`1px solid ${C.borde}`}}/>))}
            </div>
          </div>
        )}
        <div style={{marginTop:12}}>
          <div style={{fontSize:15,color:C.textoSuave,marginBottom:6}}>💬 Chat con {pr.carpNombre}</div>
          <Chat key={pr.carpinteria_id} pedidoId={sel.id} tipoPedido="cliente" miUsuario={usuario} otroUsuario={{id:pr.carpinteria_id}}/>
        </div>
      </div>
    </div>
  );

  // Detalle del pedido (se despliega dentro de la fila al tocar el pedido)
  const DetallePedido=()=>{
    const mat=MATS.find(m=>m.id===sel.material);
    const ter=TERS.find(t=>t.id===sel.terminacion);
    return(
      <div style={{marginTop:12,borderTop:`1px dashed ${C.borde}`,paddingTop:12}} className="fade">
        <div style={S.row}>
          <div style={S.col()}><div style={S.label}>Medidas</div><div style={{fontSize:16,fontFamily:"monospace",color:C.marron}}>Alto {sel.alto} · Ancho {sel.ancho} · Prof {sel.profundidad} cm</div></div>
          <div style={S.col()}><div style={S.label}>Material</div><div>{mat?.label}{sel.especie?` · ${sel.especie}`:""}</div></div>
          <div style={S.col()}><div style={S.label}>Terminación</div><div>{ter?.label}{sel.color?` · ${sel.color}`:""}</div></div>
        </div>
        {presups.length===0?(
          <div style={{textAlign:"center",color:C.textoSuave,padding:20}}>
            <div style={{fontSize:28,marginBottom:6}}>⏳</div>
            <div style={{fontSize:16}}>Esperando presupuestos de las carpinterías...</div>
          </div>
        ):(
          <div style={{marginTop:6}}>
            <div style={{fontWeight:700,color:C.marron,marginBottom:8}}>💰 Presupuestos recibidos ({presups.length})</div>
            {presups.map((pr,i)=>(
              <div key={i}>
                <div onClick={()=>setSelPresup(selPresup&&selPresup.id===pr.id?null:pr)} style={{border:`1px solid ${C.borde}`,borderRadius:10,padding:12,marginBottom:8,background:C.input,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,color:C.marron,fontSize:22}}>🔨 {pr.carpNombre}</div>
                    {pr.estado&&pr.estado!=="enviado"&&<div style={{marginTop:6}}><Badge e={pr.estado}/></div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,color:C.verde}}>$ {Number(pr.monto).toLocaleString("es-AR")}</div>
                    <div style={{fontSize:15,color:C.textoSuave,marginTop:4}}>{selPresup&&selPresup.id===pr.id?"▲ ocultar":"ver todo ▼"}</div>
                  </div>
                </div>
                {selPresup&&selPresup.id===pr.id&&<DetallePresup pr={presups.find(x=>x.id===selPresup.id)||selPresup}/>}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={S.cardTitle}>📋 Mis pedidos</div>
        <button style={S.btn("dark")} onClick={()=>setVista("nuevo")}>➕ Nuevo pedido</button>
      </div>
      {pedidos.length===0&&(
        <div style={{...S.card,textAlign:"center",padding:40}}>
          <div style={{fontSize:40,marginBottom:12}}>🪑</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:C.marron,marginBottom:8}}>¡Bienvenido a Encastre!</div>
          <div style={{fontSize:17,color:C.textoSuave,marginBottom:16}}>Creá tu primer pedido y recibí presupuestos de carpinterías</div>
          <button style={S.btn("dark")} onClick={()=>setVista("nuevo")}>➕ Crear primer pedido</button>
        </div>
      )}
      {pedidos.length>0&&(()=>{
        const venc=p=>p.fecha_limite&&new Date(p.fecha_limite)<new Date()&&p.estado!=="aceptado";
        const cuenta={
          todos:pedidos.length,
          abierto:pedidos.filter(p=>!venc(p)&&p.estado!=="aceptado").length,
          aceptado:pedidos.filter(p=>p.estado==="aceptado").length,
          vencido:pedidos.filter(p=>venc(p)).length,
        };
        return(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {[["todos","Todos"],["abierto","Abiertos"],["aceptado","Aceptados"],["vencido","Vencidos"]].map(([id,l])=>(
              <button key={id} style={{...S.btn(filtro===id?"dark":"ghost"),fontSize:15,padding:"6px 12px"}} onClick={()=>setFiltro(id)}>{l} ({cuenta[id]})</button>
            ))}
          </div>
        );
      })()}
      {pedidos.filter(p=>{
        const venc=p.fecha_limite&&new Date(p.fecha_limite)<new Date()&&p.estado!=="aceptado";
        if(filtro==="todos")return true;
        if(filtro==="vencido")return venc;
        if(filtro==="aceptado")return p.estado==="aceptado";
        if(filtro==="abierto")return !venc&&p.estado!=="aceptado";
        return true;
      }).map(p=>{
          const mat=MATS.find(m=>m.id===p.material);
          const abierto=sel&&sel.id===p.id;
          return(
          <div key={p.id} style={{...S.card,cursor:"pointer",transition:"all .15s",...(abierto?{borderColor:C.acento}:{})}}>
            <div onClick={()=>abrirPedido(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:21,color:C.marron,marginBottom:4}}>{p.descripcion}</div>
                <div style={{fontSize:17,color:C.textoSuave}}>{p.alto}×{p.ancho}×{p.profundidad} cm · {mat?.label} · {new Date(p.created_at).toLocaleDateString("es-AR")}</div>
                {p.fecha_limite&&<AvisoVence fechaLimite={p.fecha_limite}/>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <Badge e={p.estado}/>
                <span style={{color:C.textoSuave,fontSize:18}}>{abierto?"▲":"▼"}</span>
              </div>
            </div>
            {abierto&&<DetallePedido/>}
          </div>
        );
      })}
    </div>
  );
}

// ─── VISTA CARPINTERÍA ────────────────────────────────────────────────────────
function VistaCarpinteria({usuario,notif}){
  const [tab,setTab]=useState("pedidos");
  const [pedidos,setPedidos]=useState([]);
  const [sel,setSel]=useState(null);
  const [presF,setPresF]=useState({items:[{descripcion:"",precio:"",cantidad:"1"}],tiempo:"",usarDesc:false,descTipo:"porcentaje",descValor:"",usarIva:false,ivaPct:"21"});
  const [miPresupuesto,setMiPresupuesto]=useState(null);
  const [clienteSel,setClienteSel]=useState({});
  const [enviando,setEnviando]=useState(false);
  const [yaEnvio,setYaEnvio]=useState(false);
  const [convF,setConvF]=useState({valor:"",unidad:"cm"});
  const [asF,setAsF]=useState({material:"",pies:"",pulgadas:"",espesor:"",cantidad:"",descripcion:""});
  const [misPedidosAserr,setMisPedidosAserr]=useState([]);
  const [subAserr,setSubAserr]=useState("pedir");
  const [subFerr,setSubFerr]=useState("pedir");
  const [subPint,setSubPint]=useState("pedir");
  const [intAs,setIntAs]=useState(false);
  const [intFe,setIntFe]=useState(false);
  const [intPi,setIntPi]=useState(false);
  const marcaErr=(activo,cond)=>(activo&&cond)?{border:`2px solid ${C.rojo}`}:{};
  const AvisoErr=({activo,cond,texto})=>(activo&&cond)?<div style={{color:C.rojo,fontSize:15,marginTop:4,fontWeight:600}}>⚠️ {texto||"Falta completar"}</div>:null;
  const BannerFalta=({activo,lista})=>{
    const f=lista.filter(x=>x[0]).map(x=>x[1]);
    return (activo&&f.length>0)?<div style={{marginTop:12,padding:"10px 14px",background:"#FDECEA",border:`1px solid ${C.rojo}`,borderRadius:10,color:C.rojo,fontSize:16,fontWeight:600}}>⚠️ Para enviar te falta completar: {f.join(", ")}.</div>:null;
  };
  const [selAserr,setSelAserr]=useState(null);
  const [cotizacionesAserr,setCotizacionesAserr]=useState([]);
  const [cotAserrAbierta,setCotAserrAbierta]=useState(null);
  const [ferrF,setFerrF]=useState({items:[{descripcion:"",cantidad:"1"}],notas:""});
  const [misPedidosFerreria,setMisPedidosFerreria]=useState([]);
  const [selFerr,setSelFerr]=useState(null);
  const [cotizacionesFerr,setCotizacionesFerr]=useState([]);
  const [pintF,setPintF]=useState({items:[{descripcion:"",litros:"1"}],notas:""});
  const [buscarPedido,setBuscarPedido]=useState("");
  const [filtroCarp,setFiltroCarp]=useState("cotizar");
  const [misPedidosPint,setMisPedidosPint]=useState([]);
  const [selPint,setSelPint]=useState(null);
  const [cotizacionesPint,setCotizacionesPint]=useState([]);

  const cargar=useCallback(async()=>{
    try{
      const d=await db.select("pedidos","?order=created_at.desc");
      const ids=[...new Set(d.map(p=>p.cliente_id).filter(Boolean))];
      let mapa={};
      if(ids.length){
        try{const us=await db.select("usuarios",`?id=in.(${ids.join(",")})`);us.forEach(u=>{mapa[u.id]=u.nombre;});}catch{}
      }
      // Mis presupuestos, para saber cuáles ya coticé (sobre cerrado: solo veo los míos)
      let mios={};
      try{
        const mp=await db.select("presupuestos",`?carpinteria_id=eq.${usuario.id}&select=pedido_id,estado`);
        mp.forEach(p=>{ mios[p.pedido_id]=p.estado||"enviado"; });
      }catch{}
      setPedidos(d.map(p=>({...p,_clienteNombre:mapa[p.cliente_id]||"",_miEstado:mios[p.id]||null})));
    }catch{}
  },[usuario.id]);
  // Auto-refresh cada 15 segundos para ver pedidos nuevos
  useEffect(()=>{const t=setInterval(cargar,15000);return()=>clearInterval(t);},[cargar]);
  const cargarMisPedidosAserr=useCallback(async()=>{
    try{
      const d=await db.select("pedidos_aserradero",`?carpinteria_id=eq.${usuario.id}&order=created_at.desc`);
      let conteo={};
      if(d.length){
        try{
          const ids=d.map(p=>p.id).join(",");
          const cots=await db.select("cotizaciones_aserradero",`?pedido_id=in.(${ids})&select=pedido_id`);
          cots.forEach(c=>{conteo[c.pedido_id]=(conteo[c.pedido_id]||0)+1;});
        }catch{}
      }
      setMisPedidosAserr(d.map(p=>({...p,_cantCot:conteo[p.id]||0})));
    }catch{}
  },[usuario.id]);
  const cargarMisPedidosFerreria=useCallback(async()=>{
    try{
      const d=await db.select("pedidos_ferreteria",`?carpinteria_id=eq.${usuario.id}&order=created_at.desc`);
      let conteo={};
      if(d.length){
        try{
          const ids=d.map(p=>p.id).join(",");
          const cots=await db.select("cotizaciones_ferreteria",`?pedido_id=in.(${ids})&select=pedido_id`);
          cots.forEach(c=>{conteo[c.pedido_id]=(conteo[c.pedido_id]||0)+1;});
        }catch{}
      }
      setMisPedidosFerreria(d.map(p=>({...p,_cantCot:conteo[p.id]||0})));
    }catch{}
  },[usuario.id]);
  const [ferrAbierta,setFerrAbierta]=useState(null);
  const abrirPedidoFerr=async(p)=>{
    setSelFerr(p);
    setFerrAbierta(null);
    try{
      const d=await db.select("cotizaciones_ferreteria",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      const enr=await Promise.all(d.map(async ct=>{
        const fe=await db.select("usuarios",`?id=eq.${ct.ferreteria_id}&limit=1`);
        let items=[];
        try{ items=Array.isArray(ct.presupuesto_items)?ct.presupuesto_items:JSON.parse(ct.presupuesto_items||"[]"); }catch{items=[];}
        return{...ct,ferrNombre:fe[0]?.nombre||"Ferretería",ferrObj:fe[0]||{},items};
      }));
      setCotizacionesFerr(enr);
    }catch{}
  };
  const cargarMisPedidosPint=useCallback(async()=>{
    try{
      const d=await db.select("pedidos_pintureria",`?carpinteria_id=eq.${usuario.id}&order=created_at.desc`);
      let conteo={};
      if(d.length){
        try{
          const ids=d.map(p=>p.id).join(",");
          const cots=await db.select("cotizaciones_pintureria",`?pedido_id=in.(${ids})&select=pedido_id`);
          cots.forEach(c=>{conteo[c.pedido_id]=(conteo[c.pedido_id]||0)+1;});
        }catch{}
      }
      setMisPedidosPint(d.map(p=>({...p,_cantCot:conteo[p.id]||0})));
    }catch{}
  },[usuario.id]);
  const [pintAbierta,setPintAbierta]=useState(null);
  const abrirPedidoPint=async(p)=>{
    setSelPint(p);
    setPintAbierta(null);
    try{
      const d=await db.select("cotizaciones_pintureria",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      const enr=await Promise.all(d.map(async ct=>{
        const pe=await db.select("usuarios",`?id=eq.${ct.pintureria_id}&limit=1`);
        let items=[];
        try{ items=Array.isArray(ct.presupuesto_items)?ct.presupuesto_items:JSON.parse(ct.presupuesto_items||"[]"); }catch{items=[];}
        return{...ct,pintNombre:pe[0]?.nombre||"Pinturería",pintObj:pe[0]||{},items};
      }));
      setCotizacionesPint(enr);
    }catch{}
  };
  useEffect(()=>{cargar();cargarMisPedidosAserr();cargarMisPedidosFerreria();cargarMisPedidosPint();},[cargar,cargarMisPedidosAserr,cargarMisPedidosFerreria,cargarMisPedidosPint]);

  const enviarPresup=async()=>{
    if(!sel||enviando||yaEnvio)return;
    const itemsValidos=(presF.items||[]).filter(it=>it.descripcion.trim()&&nmb(it.precio)>0&&nmb(it.cantidad)>0);
    if(itemsValidos.length===0){alert("Cargá al menos un ítem con descripción, precio y cantidad.");return;}
    if(sel.fecha_limite&&new Date(sel.fecha_limite)<new Date()){alert("Este pedido venció: ya no se pueden enviar presupuestos.");return;}
    setEnviando(true);
    try{
      // Número correlativo por empresa: mayor número existente + 1
      let numero=1;
      try{
        const prev=await db.select("presupuestos",`?carpinteria_id=eq.${usuario.id}&select=numero&order=numero.desc.nullslast&limit=1`);
        if(prev&&prev.length>0&&prev[0].numero!=null) numero=Number(prev[0].numero)+1;
      }catch{}
      const calc=calcularPresup(itemsValidos,presF);
      const datos={
        pedido_id:sel.id, carpinteria_id:usuario.id, numero,
        monto:calc.total, total:calc.total, subtotal:calc.subtotal,
        descuento_tipo:presF.usarDesc?presF.descTipo:null,
        descuento_valor:presF.usarDesc?nmb(presF.descValor):null,
        iva_pct:presF.usarIva?nmb(presF.ivaPct):null,
        tiempo_entrega:presF.tiempo, incluye_flete:false, monto_flete:0, detalle:null
      };
      const creado=await db.insert("presupuestos",datos);
      const presId=Array.isArray(creado)?creado[0]?.id:creado?.id;
      if(presId){
        for(let i=0;i<itemsValidos.length;i++){
          const it=itemsValidos[i];
          await db.insert("presupuesto_items",{presupuesto_id:presId,descripcion:it.descripcion.trim(),precio:nmb(it.precio),cantidad:nmb(it.cantidad),importe:nmb(it.precio)*nmb(it.cantidad),orden:i});
        }
      }
      // NO se cambia el estado global del pedido: cada carpintería ve su propio estado.
      // (El pedido solo pasa a "aceptado" cuando el cliente elige, desde su vista.)
      notif("¡Presupuesto enviado correctamente!");
      setPresF({items:[{descripcion:"",precio:"",cantidad:"1"}],tiempo:"",usarDesc:false,descTipo:"porcentaje",descValor:"",usarIva:false,ivaPct:"21"});
      setYaEnvio(true);
      setMiPresupuesto({...datos,id:presId,items:itemsValidos.map(it=>({...it,precio:nmb(it.precio),cantidad:nmb(it.cantidad),importe:nmb(it.precio)*nmb(it.cantidad)})),created_at:new Date().toISOString()});
      setPedidos(ps=>ps.map(p=>p.id===sel.id?{...p,_miEstado:"enviado"}:p));
    }catch(e){alert("Error: "+e.message);}
    setEnviando(false);
  };

  const abrirPedidoCliente=async(p)=>{
    setSel(p); setYaEnvio(false); setMiPresupuesto(null);
    try{
      const d=await db.select("presupuestos",`?pedido_id=eq.${p.id}&carpinteria_id=eq.${usuario.id}&limit=1`);
      if(d&&d.length>0){
        let items=[];
        try{ items=await db.select("presupuesto_items",`?presupuesto_id=eq.${d[0].id}&order=orden.asc`); }catch{}
        setMiPresupuesto({...d[0],items});
        setYaEnvio(true);
      }
      // datos del cliente para el formato
      try{ const cl=await db.select("usuarios",`?id=eq.${p.cliente_id}&limit=1`); setClienteSel(cl[0]||{}); }catch{}
    }catch{}
  };

  const aplicarIA=(s)=>{
    const its=(s.items||[]).map(i=>({descripcion:i.detalle||i.concepto||"",precio:String(i.monto||""),cantidad:"1"}));
    if(its.length>0) setPresF(f=>({...f,items:its,tiempo:s.tiempo_entrega||f.tiempo}));
  };

  const abrirPedidoAserr=async(p)=>{
    setSelAserr(p);
    try{
      const d=await db.select("cotizaciones_aserradero",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      const enr=await Promise.all(d.map(async ct=>{
        const as=await db.select("usuarios",`?id=eq.${ct.aserradero_id}&limit=1`);
        let items=[];
        try{ items=Array.isArray(ct.presupuesto_items)?ct.presupuesto_items:JSON.parse(ct.presupuesto_items||"[]"); }catch{items=[];}
        return{...ct,aserraderoNombre:as[0]?.nombre||"Aserradero",aserraderoObj:as[0]||{},items};
      }));
      setCotizacionesAserr(enr);
    }catch{}
  };
  const enviarAserr=async()=>{
    if(!(asF.material&&asF.pies&&asF.pulgadas&&asF.cantidad)){setIntAs(true);return;}
    try{
      await db.insert("pedidos_aserradero",{carpinteria_id:usuario.id,material:asF.material,pies:Number(asF.pies),pulgadas:Number(asF.pulgadas),espesor:Number(asF.espesor||0),cantidad:Number(asF.cantidad),descripcion:asF.descripcion});
      notif("¡Pedido enviado a los aserraderos!");
      setAsF({material:"",pies:"",pulgadas:"",espesor:"",cantidad:"",descripcion:""});
      setIntAs(false);
      cargarMisPedidosAserr();
      setSubAserr("mis");
    }catch(e){alert("Error: "+e.message);}
  };

  if(sel){
    const mat=MATS.find(m=>m.id===sel.material);
    const ter=TERS.find(t=>t.id===sel.terminacion);
    return(
      <div className="fade">
        <button style={{...S.btn("ghost"),marginBottom:14}} onClick={()=>setSel(null)}>← Volver</button>
        <div style={S.card}>
          <div style={S.cardTitle}>Pedido recibido</div>
          <div style={{fontSize:17,color:C.textoSuave,marginBottom:10}}>{sel.descripcion} · {new Date(sel.created_at).toLocaleDateString("es-AR")}</div>
          <div style={{background:C.suave,borderRadius:8,padding:12,border:`1px solid ${C.borde}`}}>
            <div style={{...S.label,marginBottom:8}}>Medidas del cliente (en cm) con equivalencias</div>
            {[["Alto",sel.alto],["Ancho",sel.ancho],["Profundidad",sel.profundidad]].map(([n,v])=>(
              <div key={n} style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:16}}>
                <span style={{color:C.textoSuave}}>{n}:</span>
                <span style={{fontFamily:"monospace",color:C.marron,fontWeight:700}}>{v}cm = {cmToMm(v)}mm = {cmToIn(v)}"</span>
              </div>
            ))}
          </div>
          <div style={S.row,{marginTop:10}}>
            <div style={S.col()}><div style={S.label}>Material</div><div style={{fontWeight:700}}>{mat?.label}{sel.especie?` · ${sel.especie}`:""}</div></div>
            <div style={S.col()}><div style={S.label}>Terminación</div><div>{ter?.label}{sel.color?` · ${sel.color}`:""}</div></div>
          </div>
          {sel.notas_croquis&&<div style={{marginTop:12}}>
            <div style={S.label}>📝 Notas del croquis</div>
            <div style={{fontSize:16,color:C.marron,whiteSpace:"pre-wrap"}}>{sel.notas_croquis}</div>
          </div>}
          {sel.croquis_imagen&&<div style={{marginTop:12}}>
            <div style={{...S.label,marginBottom:6}}>📷 Croquis del cliente</div>
            <img src={sel.croquis_imagen} alt="croquis del cliente" style={{width:"100%",borderRadius:8,border:`1px solid ${C.borde}`}}/>
          </div>}
        </div>

        {/* IA de sugerencia desactivada temporalmente — reponer cuando esté el puente serverless de Netlify */}

        {(sel.estado==="aceptado"&&(!miPresupuesto||miPresupuesto.estado!=="aceptado"))?(
        <div style={{...S.card,textAlign:"center",borderColor:"#8A7A6A"}}>
          <div style={{fontSize:32,marginBottom:8}}>🔒</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:C.marron,fontWeight:700}}>Pedido cerrado</div>
          <div style={{fontSize:16,color:C.textoSuave,marginTop:6}}>El cliente ya eligió un presupuesto para este pedido.</div>
          {miPresupuesto&&<div style={{marginTop:12}}>
            <PresupuestoFormato empresa={usuario} cliente={clienteSel||{}} items={miPresupuesto.items||[]} opts={{descuento_tipo:miPresupuesto.descuento_tipo,descuento_valor:miPresupuesto.descuento_valor,iva_pct:miPresupuesto.iva_pct}} numero={miPresupuesto.numero!=null?miPresupuesto.numero:""} fecha={miPresupuesto.created_at?new Date(miPresupuesto.created_at).toLocaleDateString("es-AR"):null} tiempoEntrega={miPresupuesto.tiempo_entrega} esEmpresa={true} aceptado={false}/>
          </div>}
        </div>
        ):(sel.fecha_limite&&new Date(sel.fecha_limite)<new Date()&&!miPresupuesto)?(
        <div style={{...S.card,textAlign:"center",borderColor:"#B23A2E"}}>
          <div style={{fontSize:32,marginBottom:8}}>⛔</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#B23A2E",fontWeight:700}}>Este pedido venció</div>
          <div style={{fontSize:16,color:C.textoSuave,marginTop:6}}>El cliente puso una fecha límite que ya pasó, así que no se pueden enviar presupuestos.</div>
        </div>
        ):miPresupuesto?(
        <div style={S.card}>
          <div style={S.cardTitle}>✅ Presupuesto enviado</div>
          <div style={{fontSize:15,color:C.textoSuave,marginBottom:10}}>Ya le enviaste un presupuesto a este cliente. Así lo ve:</div>
          <PresupuestoFormato
            empresa={usuario}
            cliente={clienteSel||{}}
            items={miPresupuesto.items||[]}
            opts={{descuento_tipo:miPresupuesto.descuento_tipo,descuento_valor:miPresupuesto.descuento_valor,iva_pct:miPresupuesto.iva_pct}}
            numero={miPresupuesto.numero!=null?miPresupuesto.numero:""}
            fecha={miPresupuesto.created_at?new Date(miPresupuesto.created_at).toLocaleDateString("es-AR"):null}
            tiempoEntrega={miPresupuesto.tiempo_entrega}
            esEmpresa={true}
            aceptado={miPresupuesto.estado==="aceptado"}
          />
        </div>
        ):(
        <div style={S.card}>
          <div style={S.cardTitle}>💰 Tu presupuesto</div>

          {(() => {
            const calc=calcularPresup(presF.items,presF);
            const setItem=(i,campo,val)=>setPresF(f=>{const its=[...f.items];its[i]={...its[i],[campo]:val};return{...f,items:its};});
            const addItem=()=>setPresF(f=>({...f,items:[...f.items,{descripcion:"",precio:"",cantidad:"1"}]}));
            const delItem=(i)=>setPresF(f=>({...f,items:f.items.length>1?f.items.filter((_,j)=>j!==i):f.items}));
            return(
            <div>
              <div style={{fontSize:14,color:C.textoSuave,marginBottom:10}}>Agregá un renglón por cada concepto (materiales, herrajes, mano de obra, flete si lo cobrás, etc.).</div>
              {presF.items.map((it,i)=>{
                const imp=nmb(it.precio)*nmb(it.cantidad);
                return(
                <div key={i} style={{border:`1px solid ${C.borde}`,borderRadius:10,padding:10,marginBottom:8,background:C.suave}}>
                  <div style={{marginBottom:8}}>
                    <label style={S.label}>Descripción</label>
                    <input value={it.descripcion} onChange={e=>setItem(i,"descripcion",e.target.value)} placeholder="Ej: Tablero de pino sin nudos" style={S.input}/>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                    <div style={{flex:1,minWidth:110}}>
                      <label style={S.label}>Precio ($)</label>
                      <input type="number" value={it.precio} onChange={e=>setItem(i,"precio",e.target.value)} placeholder="0" style={S.input}/>
                    </div>
                    <div style={{flex:"0 0 90px"}}>
                      <label style={S.label}>Cantidad</label>
                      <input type="number" value={it.cantidad} onChange={e=>setItem(i,"cantidad",e.target.value)} placeholder="1" style={S.input}/>
                    </div>
                    <div style={{flex:1,minWidth:110,textAlign:"right"}}>
                      <label style={S.label}>Importe</label>
                      <div style={{fontWeight:800,color:C.marron,fontSize:17,padding:"10px 0"}}>{fmtPeso(imp)}</div>
                    </div>
                  </div>
                  {presF.items.length>1&&<button onClick={()=>delItem(i)} style={{...S.btn("ghost"),color:C.error,borderColor:C.error,fontSize:14,padding:"5px 10px",marginTop:6,minHeight:"auto"}}>🗑️ Quitar renglón</button>}
                </div>
                );
              })}
              <button onClick={addItem} style={{...S.btn("ghost"),width:"100%",justifyContent:"center",marginBottom:14}}>＋ Agregar renglón</button>

              <div style={{marginBottom:12}}>
                <label style={S.label}>Tiempo de entrega <span style={{fontWeight:400,color:C.textoSuave}}>(opcional)</span></label>
                <input value={presF.tiempo} onChange={e=>setPresF(f=>({...f,tiempo:e.target.value}))} placeholder="Ej: 15 días" style={S.input}/>
              </div>

              {/* DESCUENTO */}
              <div style={{border:`1px solid ${C.borde}`,borderRadius:10,padding:10,marginBottom:10}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:16,color:C.marron,fontWeight:700}}>
                  <input type="checkbox" checked={presF.usarDesc} onChange={e=>setPresF(f=>({...f,usarDesc:e.target.checked}))}/>
                  Aplicar descuento
                </label>
                {presF.usarDesc&&(
                  <div style={{display:"flex",gap:8,marginTop:8,alignItems:"flex-end"}}>
                    <div style={{flex:"0 0 140px"}}>
                      <label style={S.label}>Tipo</label>
                      <select value={presF.descTipo} onChange={e=>setPresF(f=>({...f,descTipo:e.target.value}))} style={S.input}>
                        <option value="porcentaje">Porcentaje (%)</option>
                        <option value="monto">Monto fijo ($)</option>
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <label style={S.label}>{presF.descTipo==="porcentaje"?"% de descuento":"Monto ($)"}</label>
                      <input type="number" value={presF.descValor} onChange={e=>setPresF(f=>({...f,descValor:e.target.value}))} placeholder="0" style={S.input}/>
                    </div>
                  </div>
                )}
              </div>

              {/* IVA */}
              <div style={{border:`1px solid ${C.borde}`,borderRadius:10,padding:10,marginBottom:14}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:16,color:C.marron,fontWeight:700}}>
                  <input type="checkbox" checked={presF.usarIva} onChange={e=>setPresF(f=>({...f,usarIva:e.target.checked}))}/>
                  Agregar IVA
                </label>
                {presF.usarIva&&(
                  <div style={{marginTop:8}}>
                    <label style={S.label}>% de IVA</label>
                    <input type="number" value={presF.ivaPct} onChange={e=>setPresF(f=>({...f,ivaPct:e.target.value}))} placeholder="21" style={{...S.input,maxWidth:160}}/>
                  </div>
                )}
              </div>

              {/* TOTALES */}
              <div style={{background:C.suave,borderRadius:10,padding:12,border:`1px solid ${C.borde}`,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:16}}><span style={{color:C.textoSuave}}>Subtotal</span><b>{fmtPeso(calc.subtotal)}</b></div>
                {presF.usarDesc&&calc.descuento>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:16,color:C.error}}><span>Descuento{presF.descTipo==="porcentaje"?` (${nmb(presF.descValor)}%)`:""}</span><b>− {fmtPeso(calc.descuento)}</b></div>}
                {presF.usarIva&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:16}}><span style={{color:C.textoSuave}}>IVA ({nmb(presF.ivaPct)}%)</span><b>{fmtPeso(calc.iva)}</b></div>}
                <div style={{display:"flex",justifyContent:"space-between",borderTop:`2px solid ${C.verde}`,paddingTop:8,marginTop:4}}><span style={{fontWeight:800,fontSize:19,color:C.marron}}>TOTAL</span><b style={{fontWeight:800,fontSize:22,color:C.verde}}>{fmtPeso(calc.total)}</b></div>
              </div>

              <button style={{...S.btn("dark"),opacity:enviando||yaEnvio?0.6:1}} onClick={enviarPresup} disabled={enviando||yaEnvio}>
                {enviando?"⟳ Enviando...":(yaEnvio?"✅ Presupuesto enviado":"📤 Enviar presupuesto")}
              </button>
              {yaEnvio&&<div style={{fontSize:17,color:C.verde,marginTop:6,fontWeight:700}}>✅ El cliente ya recibió tu presupuesto.</div>}
            </div>
            );
          })()}
        </div>
        )}

        <div style={S.card}>
          <div style={S.cardTitle}>💬 Chat con cliente</div>
          <Chat pedidoId={sel.id} tipoPedido="cliente" miUsuario={usuario} otroUsuario={{id:sel.cliente_id}}/>
        </div>
      </div>
    );
  }

  const tabStyle=(id)=>({background:tab===id?C.marron:"transparent",color:tab===id?C.crema:C.textoSuave,border:tab===id?"none":`1px solid ${C.borde}`,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:17,fontWeight:700,fontFamily:"'Lato',sans-serif"});

  return(
    <div>
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {[["pedidos","📋 Pedidos recibidos"],["aserradero","🪵 Aserraderos"],["ferreteria","🔩 Ferreterías"],["pintureria","🎨 Pinturerías"],["conversion","📐 Conversor"]].map(([id,l])=>(
          <button key={id} style={tabStyle(id)} onClick={()=>setTab(id)}>{l}</button>
        ))}
      </div>

      {tab==="pedidos"&&(
        <div>
          <div style={S.secTitle}>Pedidos de presupuesto de clientes</div>
          <div style={{position:"relative",marginBottom:14}}>
            <input value={buscarPedido} onChange={e=>setBuscarPedido(e.target.value)} placeholder="🔍 Buscar por cliente o por encargo..." style={{...S.input,paddingRight:buscarPedido?40:15}}/>
            {buscarPedido&&<button type="button" onClick={()=>setBuscarPedido("")} aria-label="Borrar búsqueda" style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",minHeight:"auto",background:"none",border:"none",cursor:"pointer",fontSize:18,padding:6,color:C.textoSuave}}>✕</button>}
          </div>
          {pedidos.length===0&&<div style={{...S.card,color:C.textoSuave,textAlign:"center",padding:28,fontStyle:"italic"}}>No hay pedidos aún</div>}
          {pedidos.length>0&&(()=>{
            const venc=p=>p.fecha_limite&&new Date(p.fecha_limite)<new Date();
            const cuenta={
              cotizar:pedidos.filter(p=>p.estado!=="aceptado"&&!venc(p)&&!p._miEstado).length,
              cotizados:pedidos.filter(p=>p._miEstado&&p.estado!=="aceptado").length,
              cerrados:pedidos.filter(p=>p.estado==="aceptado").length,
              vencido:pedidos.filter(p=>venc(p)&&p.estado!=="aceptado"&&!p._miEstado).length,
              todos:pedidos.length,
            };
            return(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                {[["cotizar","Para cotizar"],["cotizados","Cotizados"],["cerrados","Cerrados"],["vencido","Vencidos"],["todos","Todos"]].map(([id,l])=>(
                  <button key={id} style={{...S.btn(filtroCarp===id?"dark":"ghost"),fontSize:15,padding:"6px 12px"}} onClick={()=>setFiltroCarp(id)}>{l} ({cuenta[id]})</button>
                ))}
              </div>
            );
          })()}
          {(()=>{
            const q=buscarPedido.trim().toLowerCase();
            const venc=p=>p.fecha_limite&&new Date(p.fecha_limite)<new Date();
            let lista=pedidos.filter(p=>{
              if(filtroCarp==="cotizar")return p.estado!=="aceptado"&&!venc(p)&&!p._miEstado;
              if(filtroCarp==="cotizados")return p._miEstado&&p.estado!=="aceptado";
              if(filtroCarp==="cerrados")return p.estado==="aceptado";
              if(filtroCarp==="vencido")return venc(p)&&p.estado!=="aceptado"&&!p._miEstado;
              return true;
            });
            if(q)lista=lista.filter(p=>(p.descripcion||"").toLowerCase().includes(q)||(p._clienteNombre||"").toLowerCase().includes(q));
            if(pedidos.length>0&&lista.length===0) return <div style={{...S.card,color:C.textoSuave,textAlign:"center",padding:24,fontStyle:"italic"}}>No hay pedidos en esta categoría{q?` para "${buscarPedido}"`:""}</div>;
            return lista.map(p=>{
            const mat=MATS.find(m=>m.id===p.material);
            const vencido=p.fecha_limite&&new Date(p.fecha_limite)<new Date();
            let et;
            if(p.estado==="aceptado"){ et=p._miEstado==="aceptado"?{t:"Aceptado ✓",bg:C.verde,fg:"#fff"}:{t:"Cerrado · adjudicado a otro",bg:"#8A7A6A",fg:"#fff"}; }
            else if(p._miEstado){ et={t:"Cotizado por mí",bg:C.acento,fg:C.marron}; }
            else if(vencido){ et={t:"Vencido",bg:"#B23A2E",fg:"#fff"}; }
            else { et={t:"Para cotizar",bg:C.marron,fg:C.crema}; }
            const cerradoParaMi = p.estado==="aceptado" && p._miEstado!=="aceptado";
            return(
              <div key={p.id} style={{...S.card,cursor:cerradoParaMi?"default":"pointer",transition:"all .15s",opacity:cerradoParaMi?0.7:1}} onClick={()=>{ if(!cerradoParaMi) abrirPedidoCliente(p); }}
                onMouseEnter={e=>{if(!cerradoParaMi){e.currentTarget.style.borderColor=C.acento;e.currentTarget.style.transform="translateY(-1px)";}}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.borde;e.currentTarget.style.transform="none";}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.marron,fontSize:21}}>{p.descripcion}</div>
                    {p._clienteNombre&&<div style={{fontSize:16,color:C.marron,marginTop:2}}>👤 {p._clienteNombre}</div>}
                    <div style={{fontSize:17,color:C.textoSuave,marginTop:3}}>{p.alto}×{p.ancho}×{p.profundidad}cm · {mat?.label} · {new Date(p.created_at).toLocaleDateString("es-AR")}</div>
                    {p.fecha_limite&&<div style={{marginTop:4}}><AvisoVence fechaLimite={p.fecha_limite}/></div>}
                  </div>
                  <span style={{alignSelf:"flex-start",whiteSpace:"nowrap",background:et.bg,color:et.fg,fontSize:13,fontWeight:700,padding:"5px 10px",borderRadius:20,fontFamily:"'Lato',sans-serif"}}>{et.t}</span>
                </div>
              </div>
            );
          });
          })()}
        </div>
      )}

      {tab==="aserradero"&&(
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["pedir","🪵 Pedir madera"],["mis",`📋 Mis pedidos${misPedidosAserr.length>0?` (${misPedidosAserr.length})`:""}`]].map(([id,l])=>(
            <button key={id} style={{...S.btn(subAserr===id?"dark":"ghost"),flex:1,justifyContent:"center",fontSize:16}} onClick={()=>setSubAserr(id)}>{l}</button>
          ))}
        </div>
      )}

      {tab==="aserradero"&&subAserr==="pedir"&&(
        <div style={S.card}>
          <div style={S.cardTitle}>🪵 Pedir madera al aserradero</div>
          <div style={{fontSize:17,color:C.textoSuave,marginBottom:14,fontStyle:"italic"}}>Las medidas van en pulgadas y pies (como trabaja el aserradero)</div>
          <label style={S.label}>Tipo de madera</label>
          <input value={asF.material} onChange={e=>setAsF(f=>({...f,material:e.target.value}))} placeholder="Ej: Roble, Pino, Cedro, Quebracho..." style={{...S.input,marginBottom:0,...marcaErr(intAs,!asF.material)}}/>
          <AvisoErr activo={intAs} cond={!asF.material} texto="Falta el tipo de madera"/>
          <div style={{marginBottom:14}}/>
          <div style={S.row}>
            <div style={S.col()}><label style={S.label}>Largo (pies)</label><input type="number" value={asF.pies} onChange={e=>setAsF(f=>({...f,pies:e.target.value}))} placeholder="0'" style={{...S.input,...marcaErr(intAs,!asF.pies)}}/><AvisoErr activo={intAs} cond={!asF.pies} texto="Falta el largo"/>{asF.pies&&<div style={{fontSize:17,color:C.textoSuave,fontFamily:"monospace"}}>= {ftToCm(asF.pies)}cm</div>}</div>
            <div style={S.col()}><label style={S.label}>Ancho (pulgadas)</label><input type="number" value={asF.pulgadas} onChange={e=>setAsF(f=>({...f,pulgadas:e.target.value}))} placeholder='0"' style={{...S.input,...marcaErr(intAs,!asF.pulgadas)}}/><AvisoErr activo={intAs} cond={!asF.pulgadas} texto="Falta el ancho"/>{asF.pulgadas&&<div style={{fontSize:17,color:C.textoSuave,fontFamily:"monospace"}}>= {inToCm(asF.pulgadas)}cm</div>}</div>
            <div style={S.col()}><label style={S.label}>Espesor (pulgadas)</label><input type="number" value={asF.espesor||""} onChange={e=>setAsF(f=>({...f,espesor:e.target.value}))} placeholder='0"' style={S.input}/>{asF.espesor&&<div style={{fontSize:17,color:C.textoSuave,fontFamily:"monospace"}}>= {inToCm(asF.espesor)}cm</div>}</div>
            <div style={S.col()}><label style={S.label}>Cantidad</label><input type="number" value={asF.cantidad} onChange={e=>setAsF(f=>({...f,cantidad:e.target.value}))} placeholder="0" style={{...S.input,...marcaErr(intAs,!asF.cantidad)}}/><AvisoErr activo={intAs} cond={!asF.cantidad} texto="Falta la cantidad"/></div>
          </div>
          <div style={{marginTop:12}}><label style={S.label}>Observaciones</label><textarea value={asF.descripcion} onChange={e=>setAsF(f=>({...f,descripcion:e.target.value}))} placeholder="Calidad, secado, escuadría..." style={{...S.input,minHeight:56,resize:"vertical"}}/></div>
          <BannerFalta activo={intAs} lista={[[!asF.material,"el tipo de madera"],[!asF.pies,"el largo"],[!asF.pulgadas,"el ancho"],[!asF.cantidad,"la cantidad"]]}/>
          <button style={{...S.btn("dark"),marginTop:12}} onClick={enviarAserr}>📤 Enviar a aserraderos</button>
        </div>
      )}

      {tab==="aserradero"&&subAserr==="mis"&&misPedidosAserr.length===0&&(
        <div style={S.card}>
          <div style={{fontSize:17,color:C.textoSuave,fontStyle:"italic"}}>Todavía no enviaste pedidos de madera. Andá a la solapa "Pedir madera" para hacer el primero.</div>
        </div>
      )}

      {tab==="aserradero"&&subAserr==="mis"&&misPedidosAserr.length>0&&(
        <div style={S.card}>
          <div style={S.cardTitle}>📋 Mis pedidos enviados</div>
          {misPedidosAserr.map(p=>{
            const abierto=selAserr&&selAserr.id===p.id;
            return(
            <div key={p.id} style={{border:`1px solid ${abierto?C.acento:C.borde}`,borderRadius:8,padding:12,marginBottom:10,background:C.input}}>
              <div style={{display:"flex",justifyContent:"space-between",cursor:"pointer"}}
                onClick={()=>{ if(abierto){setSelAserr(null);} else {setCotAserrAbierta(null);abrirPedidoAserr(p);} }}>
                <div>
                  <div style={{fontWeight:700,color:C.marron}}>{p.material}</div>
                  <div style={{fontSize:17,color:C.textoSuave}}>{p.pies}' largo · {p.pulgadas}" ancho · {p.espesor}" espesor · {p.cantidad} piezas</div>
                  <div style={{fontSize:17,color:C.textoSuave}}>{new Date(p.created_at).toLocaleDateString("es-AR")}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{whiteSpace:"nowrap",background:p._cantCot>0?C.verde:C.suave,color:p._cantCot>0?"#fff":C.textoSuave,fontSize:13,fontWeight:700,padding:"5px 10px",borderRadius:20,fontFamily:"'Lato',sans-serif"}}>
                    {p._cantCot>0?`${p._cantCot} cotización${p._cantCot>1?"es":""}`:"Sin cotizaciones"}
                  </span>
                  <span style={{color:C.textoSuave,fontSize:18}}>{abierto?"▲":"▼"}</span>
                </div>
              </div>
              {abierto&&(
                <div style={{marginTop:12,borderTop:`1px dashed ${C.borde}`,paddingTop:12}} className="fade">
                  <div style={{fontWeight:700,color:C.marron,marginBottom:8}}>💰 Cotizaciones recibidas</div>
                  {cotizacionesAserr.length===0?(
                    <div style={{color:C.textoSuave,textAlign:"center",padding:20,fontStyle:"italic"}}>⏳ Esperando cotizaciones del aserradero...</div>
                  ):(
                    cotizacionesAserr.map((ct,i)=>{
                      const key=ct.id||i;
                      const abiertaCot=cotAserrAbierta===key;
