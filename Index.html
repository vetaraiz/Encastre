async function pedirIA(prompt) {
  try {
    const r = await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:prompt}]})});
    const d = await r.json();
    const t = d.content?.map(i=>i.text||"").join("")||"";
    return JSON.parse(t.replace(/```json|```/g,"").trim());
  } catch { return null; }
}

Pedido: ${pedido.descripcion}

function AuthScreen({onAuth}){
  const [modo,setModo]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [nombre,setNombre]=useState("");
  const [tipo,setTipo]=useState("");
  const [ciudad,setCiudad]=useState("");
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [cargando,setCargando]=useState(false);

  const tipos=[
    {id:"cliente",emoji:"🪑",label:"Consumidor Final",desc:"Quiero encargar muebles o construcciones en madera"},
    {id:"carpinteria",emoji:"🔨",label:"Carpintería",desc:"Recibo pedidos y presupuesto trabajos"},
    {id:"aserradero",emoji:"🪵",label:"Aserradero",desc:"Vendo madera a carpinterías y negocios"},
    {id:"flete",emoji:"🚚",label:"Flete / Transporte",desc:"Traslado muebles y materiales"},
    {id:"ferreteria",emoji:"🔩",label:"Ferretería / Herrajes",desc:"Vendo herrajes, bisagras y materiales a carpinterías"},
  ];

  const submit=async()=>{
    setErr("");setOk("");setCargando(true);
    try{
      if(modo==="registro"){
        if(!tipo||!nombre){setErr("Completá todos los campos");setCargando(false);return;}
        const signUpRes=await db.signUp(email,pass);
        const error=signUpRes.error;
        if(error){setErr(error.message||"Error al registrar");setCargando(false);return;}
        const user=signUpRes.data?.user||signUpRes.user||signUpRes;
        const userId=user?.id||signUpRes?.id;
        if(!userId){
          // User created but no ID returned - try to insert with email only
          await db.insert("usuarios",{tipo,nombre,email,ciudad});
        } else {
          await db.insert("usuarios",{auth_id:userId,tipo,nombre,email,ciudad});
        }
        setOk("¡Cuenta creada! Ahora iniciá sesión.");
        setModo("login");
      }else{
        const signInRes=await db.signIn(email,pass);
        const access_token=signInRes.access_token;
        const error=signInRes.error;
        if(error||!access_token){setErr("Email o contraseña incorrectos");setCargando(false);return;}
        const perfiles=await db.select("usuarios",`?email=eq.${email}&limit=1`);
        if(perfiles.length===0){setErr("Perfil no encontrado");setCargando(false);return;}
        console.log("Usuario al login:",perfiles[0]);
        onAuth({token:access_token,usuario:perfiles[0]});
      }
    }catch(e){setErr("Error: "+(e.message||"Revisá tu conexión"));}
    setCargando(false);
  };

      <div style={{marginTop:20,fontSize:11,color:C.textoSuave,letterSpacing:.5}}>Hecho con 🌿 para el oficio de la madera</div>

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function Chat({pedidoId,tipoPedido,miUsuario,otroUsuario}){
  const [msgs,setMsgs]=useState([]);
  const [txt,setTxt]=useState("");
  const endRef=useRef(null);

  const cargar=useCallback(async()=>{
    try{ const d=await db.select("mensajes",`?pedido_id=eq.${pedidoId}&tipo_pedido=eq.${tipoPedido}&order=created_at.asc`); setMsgs(d); }catch{}
  },[pedidoId,tipoPedido]);

  useEffect(()=>{cargar();const t=setInterval(cargar,10000);return()=>clearInterval(t);},[cargar]);
  // scroll manual only

  const enviar=async()=>{
    if(!txt.trim())return;
    const m={pedido_id:pedidoId,tipo_pedido:tipoPedido,de_usuario_id:miUsuario.id,para_usuario_id:otroUsuario?.id,texto:txt};
    setTxt("");
    try{await db.insert("mensajes",m);await cargar();}catch{}
  };

  return(
    <div style={{background:C.input,border:`1px solid ${C.borde}`,borderRadius:10,overflow:"hidden"}}>
      <div style={{padding:"9px 14px",background:C.suave,fontSize:11,color:C.textoSuave,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",borderBottom:`1px solid ${C.borde}`}}>💬 Chat directo</div>
      <div style={{maxHeight:180,overflowY:"auto",padding:"10px 14px"}}>
        {msgs.length===0&&<div style={{color:C.textoSuave,fontSize:12,textAlign:"center",padding:16,fontStyle:"italic"}}>Sin mensajes aún...</div>}
        {msgs.map((m,i)=>{
          const propio=m.de_usuario_id===miUsuario.id;
          return(
            <div key={i} style={{marginBottom:8,display:"flex",flexDirection:propio?"row-reverse":"row",gap:6}}>
              <div style={{background:propio?C.marron:C.card,border:`1px solid ${propio?C.marron:C.borde}`,borderRadius:8,padding:"6px 11px",maxWidth:"78%"}}>
                <div style={{fontSize:10,color:propio?C.acento:C.textoSuave,marginBottom:2}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                <div style={{fontSize:13,color:propio?C.crema:C.texto}}>{m.texto}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8,padding:"8px 14px",borderTop:`1px solid ${C.borde}`,background:C.card}}>
        <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")enviar();}} placeholder="Escribí tu mensaje..." style={{...S.input,flex:1}}/>
        <button style={S.btn("dark")} onClick={enviar}>Enviar</button>
      </div>
    </div>
  );
}

// ─── CALIFICACIÓN ─────────────────────────────────────────────────────────────
function Calificar({deUsuario,paraUsuario,pedidoId,califs=[]}){
  const [open,setOpen]=useState(false);
  const [stars,setStars]=useState(0);
  const [coment,setComent]=useState("");
  const [enviado,setEnviado]=useState(false);

  const enviar=async()=>{
    if(!stars)return;
    try{
      await db.insert("calificaciones",{de_usuario_id:deUsuario.id,para_usuario_id:paraUsuario.id,pedido_id:pedidoId,estrellas:stars,comentario:coment});
      setEnviado(true);setOpen(false);
    }catch{}
  };

  return(
    <div style={{marginTop:12}}>
      {califs.map((c,i)=>(
        <div key={i} style={{fontSize:12,color:C.textoSuave,marginBottom:4}}>
          <Stars v={c.estrellas}/> — {c.comentario}
          {c.respuesta&&<div style={{fontSize:11,color:C.textoSuave,marginLeft:12,marginTop:2,fontStyle:"italic"}}>↩ {c.respuesta}</div>}
        </div>
      ))}
      {!enviado&&(
        <div>
          <button style={{...S.btn("ghost"),fontSize:12,padding:"5px 12px"}} onClick={()=>setOpen(!open)}>{open?"Cerrar":"⭐ Calificar"}</button>
          {open&&(
            <div style={{marginTop:10,background:C.input,borderRadius:8,padding:12,border:`1px solid ${C.borde}`}} className="fade">
              <div style={{display:"flex",gap:4,marginBottom:8}}>
                {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setStars(n)} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,color:n<=stars?C.acento:C.borde}}>★</button>)}
              </div>
              <textarea value={coment} onChange={e=>setComent(e.target.value)} placeholder="Contá tu experiencia..." style={{...S.input,minHeight:56,resize:"vertical"}}/>
              <button style={{...S.btn("dark"),marginTop:8,fontSize:12}} onClick={enviar}>Enviar calificación</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── NUEVO PEDIDO ─────────────────────────────────────────────────────────────
function NuevoPedido({usuario,onGuardar,onCancelar,notif}){
  const [f,setF]=useState({descripcion:"",alto:"",ancho:"",profundidad:"",material:"",terminacion:"",color:"",notasCroquis:"",usaCroquis:false});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const ok=f.descripcion&&f.alto&&f.ancho&&f.profundidad&&f.material&&f.terminacion;

  const guardar=async()=>{
    try{
      if(!usuario||!usuario.id){alert("Error: no se encontró tu usuario. Cerrá sesión y volvé a entrar.");return;}
      const resultado=await db.insert("pedidos",{cliente_id:usuario.id,descripcion:f.descripcion,alto:Number(f.alto),ancho:Number(f.ancho),profundidad:Number(f.profundidad),material:f.material,terminacion:f.terminacion,color:f.color,notas_croquis:f.notasCroquis});
      console.log("Pedido guardado:",resultado);
      notif("¡Pedido enviado a todas las carpinterías!");
      onGuardar();
    }catch(e){alert("Error al guardar pedido: "+e.message);}
  };

  return(
    <div style={S.card} className="fade">
      <div style={S.cardTitle}>✏️ Nuevo pedido de presupuesto</div>

      <div style={{marginBottom:14}}>
        <label style={S.label}>¿Qué necesitás?</label>
        <textarea value={f.descripcion} onChange={e=>set("descripcion",e.target.value)} placeholder="Describí lo que querés hacer: ej. Mesa de comedor para 8 personas con cajón lateral..." style={{...S.input,minHeight:72,resize:"vertical"}}/>
      </div>

      <Divider/>
      <div style={S.secTitle}>📐 Medidas en centímetros</div>
      <div style={S.row}>
        {[["alto","Alto (cm)"],["ancho","Ancho (cm)"],["profundidad","Profundidad (cm)"]].map(([k,l])=>(
          <div key={k} style={S.col()}>
            <label style={S.label}>{l}</label>
            <input type="number" value={f[k]} onChange={e=>set(k,e.target.value)} placeholder="0" style={S.input}/>
            {f[k]&&<div style={{fontSize:10,color:C.textoSuave,marginTop:3,fontFamily:"monospace"}}>= {cmToMm(f[k])}mm · {cmToIn(f[k])}"</div>}
          </div>
        ))}
      </div>

      <div style={{marginTop:12}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12,color:C.textoSuave}}>
          <input type="checkbox" checked={f.usaCroquis} onChange={e=>set("usaCroquis",e.target.checked)}/>
          Quiero adjuntar descripción de un croquis con medidas aproximadas
        </label>
        {f.usaCroquis&&<textarea value={f.notasCroquis} onChange={e=>set("notasCroquis",e.target.value)} placeholder="Describí el croquis..." style={{...S.input,minHeight:56,resize:"vertical",marginTop:8}}/>}
      </div>

      <Divider/>
      <div style={S.secTitle}>🪵 Material</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
        {MATS.map(m=><button key={m.id} style={S.tag(f.material===m.id)} onClick={()=>{set("material",m.id);set("terminacion","");set("color","");}}>{m.label}</button>)}
      </div>
      {MATS.find(m=>m.id===f.material)&&<div style={{fontSize:11,color:C.textoSuave,fontStyle:"italic"}}>Ej: {MATS.find(m=>m.id===f.material).ej}</div>}

      <Divider/>
      <div style={S.secTitle}>🎨 Terminación / Acabado</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
        {TERS.filter(t=>{
          const esMadera=["madera_dura","madera_semidura","madera_blanda"].includes(f.material);
          const esMelamina=["aglomerado_melamina","mdf_melamina"].includes(f.material);
          const esTablero=["aglomerado","mdf","fenolico"].includes(f.material);
          if(esMadera) return ["crudo","pintado","lacheado","enchapado"].includes(t.id);
          if(esMelamina) return ["melamina_color"].includes(t.id);
          if(esTablero) return ["crudo","pintado","lacheado","enchapado","melamina_color"].includes(t.id);
          return true;
        }).map(t=>{
          // Reset terminacion if not valid for current material
          if(f.terminacion&&f.terminacion===t.id&&false) set("terminacion","");
          return <button key={t.id} style={S.tag(f.terminacion===t.id)} onClick={()=>set("terminacion",t.id)}>{t.label}</button>;
        })}
      </div>
      {f.terminacion==="melamina_color"&&(
        <div style={{marginTop:10}}>
          <label style={S.label}>Color de melamina</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{COLORES_MEL.map(c=><button key={c} style={S.tag(f.color===c)} onClick={()=>set("color",c)}>{c}</button>)}</div>
        </div>
      )}
      {f.terminacion==="pintado"&&(
        <div style={{marginTop:10}}>
          <label style={S.label}>Color</label>
          <input value={f.color} onChange={e=>set("color",e.target.value)} placeholder="Ej: Blanco roto..." style={{...S.input,maxWidth:220}}/>
        </div>
      )}

      <div style={{display:"flex",gap:10,marginTop:20}}>
        <button style={S.btn("dark")} disabled={!ok} onClick={guardar}>📤 Enviar pedido</button>
        <button style={S.btn("ghost")} onClick={onCancelar}>Cancelar</button>
      </div>
    </div>
  );
}

// ─── VISTA CLIENTE ────────────────────────────────────────────────────────────
function VistaCliente({usuario,notif}){
  const [pedidos,setPedidos]=useState([]);
  const [vista,setVista]=useState("lista");
  const [sel,setSel]=useState(null);
  const [presups,setPresups]=useState([]);

  const cargar=useCallback(async()=>{
    try{const d=await db.select("pedidos",`?cliente_id=eq.${usuario.id}&order=created_at.desc`);setPedidos(d);}catch{}
  },[usuario.id]);

  useEffect(()=>{cargar();},[cargar]);

  const abrirPedido=async(p)=>{
    setSel(p);
    try{
      const d=await db.select("presupuestos",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      const enr=await Promise.all(d.map(async pr=>{
        const c=await db.select("usuarios",`?id=eq.${pr.carpinteria_id}&limit=1`);
        return{...pr,carpNombre:c[0]?.nombre||"Carpintería"};
      }));
      setPresups(enr);
    }catch{}
    setVista("detalle");
  };

  const aceptar=async(pr)=>{
    try{
      await db.update("presupuestos",{estado:"aceptado"},`id=eq.${pr.id}`);
      await db.update("pedidos",{estado:"aceptado"},`id=eq.${sel.id}`);
      notif("¡Presupuesto aceptado!");
      abrirPedido(sel);
    }catch{}
  };

  if(vista==="nuevo") return <NuevoPedido usuario={usuario} onGuardar={()=>{cargar();setVista("lista");}} onCancelar={()=>setVista("lista")} notif={notif}/>;

  if(vista==="detalle"&&sel){
    const mat=MATS.find(m=>m.id===sel.material);
    const ter=TERS.find(t=>t.id===sel.terminacion);
    return(
      <div className="fade">
        <button style={{...S.btn("ghost"),marginBottom:14}} onClick={()=>setVista("lista")}>← Volver</button>
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={S.cardTitle}>{sel.descripcion}</div>
            <Badge e={sel.estado}/>
          </div>
          <div style={S.row}>
            <div style={S.col()}><div style={{...S.label}}>Medidas</div><div style={{fontSize:13,fontFamily:"monospace",color:C.marron}}>Alto {sel.alto}cm · Ancho {sel.ancho}cm · Prof {sel.profundidad}cm</div></div>
            <div style={S.col()}><div style={S.label}>Material</div><div>{mat?.label}</div></div>
            <div style={S.col()}><div style={S.label}>Terminación</div><div>{ter?.label}{sel.color?` · ${sel.color}`:""}</div></div>
          </div>
        </div>

        {presups.length===0?(
          <div style={{...S.card,textAlign:"center",color:C.textoSuave,padding:32}}>
            <div style={{fontSize:32,marginBottom:8}}>⏳</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16}}>Esperando presupuestos...</div>
            <div style={{fontSize:12,marginTop:4}}>Las carpinterías recibirán tu pedido y te responderán pronto</div>
          </div>
        ):(
          <div style={S.card}>
            <div style={S.cardTitle}>💰 Presupuestos recibidos ({presups.length})</div>
            {presups.map((pr,i)=>(
              <div key={i} style={{border:`1px solid ${C.borde}`,borderRadius:10,padding:14,marginBottom:12,background:C.input}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.marron,fontSize:16}}>{pr.carpNombre}</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,color:C.verde}}>$ {Number(pr.monto).toLocaleString("es-AR")}</div>
                </div>
                <div style={S.row}>
                  <div style={S.col()}><span style={{fontSize:11,color:C.textoSuave}}>Tiempo: </span><b>{pr.tiempo_entrega}</b></div>
                  <div style={S.col()}><span style={{fontSize:11,color:C.textoSuave}}>Flete: </span><b>{pr.incluye_flete?"✅ Incluido":"❌ No incluido"}</b></div>
                </div>
                {pr.detalle&&<div style={{marginTop:8,fontSize:12,color:C.textoSuave,whiteSpace:"pre-line",fontStyle:"italic",borderLeft:`3px solid ${C.acento}`,paddingLeft:10,marginLeft:4}}>{pr.detalle}</div>}
                <div style={{marginTop:8}}><Badge e={pr.estado}/></div>
                {pr.estado==="enviado"&&(
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <button style={S.btn("dark")} onClick={()=>aceptar(pr)}>✅ Aceptar presupuesto</button>
                    <button style={{...S.btn("ghost"),color:C.rojo,borderColor:C.rojo}}>❌ Rechazar</button>
                  </div>
                )}
                <Calificar deUsuario={usuario} paraUsuario={{id:pr.carpinteria_id}} pedidoId={sel.id}/>
              </div>
            ))}
          </div>
        )}

        <div style={S.card}>
          <div style={S.cardTitle}>💬 Chat con carpintería</div>
          <Chat pedidoId={sel.id} tipoPedido="cliente" miUsuario={usuario} otroUsuario={presups[0]?{id:presups[0].carpinteria_id}:null}/>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={S.cardTitle}>📋 Mis pedidos</div>
        <button style={S.btn("dark")} onClick={()=>setVista("nuevo")}>➕ Nuevo pedido</button>
      </div>
      {pedidos.length===0&&(
        <div style={{...S.card,textAlign:"center",padding:40}}>
          <div style={{fontSize:40,marginBottom:12}}>🪑</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.marron,marginBottom:8}}>¡Bienvenido a Encastre!</div>
          <div style={{fontSize:13,color:C.textoSuave,marginBottom:16}}>Creá tu primer pedido y recibí presupuestos de carpinterías</div>
          <button style={S.btn("dark")} onClick={()=>setVista("nuevo")}>➕ Crear primer pedido</button>
        </div>
      )}
      {pedidos.map(p=>{
        const mat=MATS.find(m=>m.id===p.material);
        return(
          <div key={p.id} style={{...S.card,cursor:"pointer",transition:"all .15s"}} onClick={()=>abrirPedido(p)}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.acento;e.currentTarget.style.transform="translateY(-1px)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.borde;e.currentTarget.style.transform="none";}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:C.marron,marginBottom:4}}>{p.descripcion}</div>
                <div style={{fontSize:12,color:C.textoSuave}}>{p.alto}×{p.ancho}×{p.profundidad} cm · {mat?.label} · {new Date(p.created_at).toLocaleDateString("es-AR")}</div>
              </div>
              <Badge e={p.estado}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── VISTA CARPINTERÍA ────────────────────────────────────────────────────────
function VistaCarpinteria({usuario,notif}){
  const [tab,setTab]=useState("pedidos");
  const [pedidos,setPedidos]=useState([]);
  const [sel,setSel]=useState(null);
  const [presF,setPresF]=useState({monto:"",tiempo:"",incluye_flete:false,detalle:""});
  const [enviando,setEnviando]=useState(false);
  const [yaEnvio,setYaEnvio]=useState(false);
  const [convF,setConvF]=useState({valor:"",unidad:"cm"});
  const [asF,setAsF]=useState({material:"",pies:"",pulgadas:"",espesor:"",cantidad:"",descripcion:""});
  const [misPedidosAserr,setMisPedidosAserr]=useState([]);
  const [selAserr,setSelAserr]=useState(null);
  const [cotizacionesAserr,setCotizacionesAserr]=useState([]);
  const [ferrF,setFerrF]=useState({descripcion:"",cantidad:"",notas:""});
  const [misPedidosFerreria,setMisPedidosFerreria]=useState([]);
  const [selFerr,setSelFerr]=useState(null);
  const [cotizacionesFerr,setCotizacionesFerr]=useState([]);

  const cargar=useCallback(async()=>{
    try{const d=await db.select("pedidos","?order=created_at.desc");setPedidos(d);}catch{}
  },[]);
  // Auto-refresh cada 15 segundos para ver pedidos nuevos
  useEffect(()=>{const t=setInterval(cargar,15000);return()=>clearInterval(t);},[cargar]);
  const cargarMisPedidosAserr=useCallback(async()=>{
    try{const d=await db.select("pedidos_aserradero",`?carpinteria_id=eq.${usuario.id}&order=created_at.desc`);setMisPedidosAserr(d);}catch{}
  },[usuario.id]);
  const cargarMisPedidosFerreria=useCallback(async()=>{
    try{const d=await db.select("pedidos_ferreteria",`?carpinteria_id=eq.${usuario.id}&order=created_at.desc`);setMisPedidosFerreria(d);}catch{}
  },[usuario.id]);
  const abrirPedidoFerr=async(p)=>{
    setSelFerr(p);
    try{
      const d=await db.select("cotizaciones_ferreteria",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      const enr=await Promise.all(d.map(async ct=>{
        const fe=await db.select("usuarios",`?id=eq.${ct.ferreteria_id}&limit=1`);
        return{...ct,ferrNombre:fe[0]?.nombre||"Ferretería"};
      }));
      setCotizacionesFerr(enr);
    }catch{}
  };
  useEffect(()=>{cargar();cargarMisPedidosAserr();cargarMisPedidosFerreria();},[cargar,cargarMisPedidosAserr,cargarMisPedidosFerreria]);

  const enviarPresup=async()=>{
    if(!presF.monto||!sel||enviando||yaEnvio)return;
    setEnviando(true);
    try{
      await db.insert("presupuestos",{pedido_id:sel.id,carpinteria_id:usuario.id,monto:Number(presF.monto),tiempo_entrega:presF.tiempo,incluye_flete:presF.incluye_flete,detalle:presF.detalle});
      await db.update("pedidos",{estado:"presupuestado"},`id=eq.${sel.id}`);
      notif("¡Presupuesto enviado correctamente!");
      setPresF({monto:"",tiempo:"",incluye_flete:false,detalle:""});
      setYaEnvio(true);
    }catch(e){alert("Error: "+e.message);}
    setEnviando(false);
  };

  const aplicarIA=(s)=>{
    const det=s.items?.map(i=>`${i.concepto}: $${Number(i.monto).toLocaleString("es-AR")} — ${i.detalle}`).join("\n")||"";
    setPresF(f=>({...f,monto:String(s.monto_total),tiempo:s.tiempo_entrega||f.tiempo,detalle:det||f.detalle}));
  };

  const abrirPedidoAserr=async(p)=>{
    setSelAserr(p);
    try{
      const d=await db.select("cotizaciones_aserradero",`?pedido_id=eq.${p.id}&order=created_at.asc`);
      const enr=await Promise.all(d.map(async ct=>{
        const as=await db.select("usuarios",`?id=eq.${ct.aserradero_id}&limit=1`);
        return{...ct,aserraderoNombre:as[0]?.nombre||"Aserradero"};
      }));
      setCotizacionesAserr(enr);
    }catch{}
  };
  const enviarAserr=async()=>{
    if(!asF.material)return;
    try{
      await db.insert("pedidos_aserradero",{carpinteria_id:usuario.id,material:asF.material,pies:Number(asF.pies),pulgadas:Number(asF.pulgadas),espesor:Number(asF.espesor||0),cantidad:Number(asF.cantidad),descripcion:asF.descripcion});
      notif("¡Pedido enviado a los aserraderos!");
      setAsF({material:"",pies:"",pulgadas:"",espesor:"",cantidad:"",descripcion:""});
    }catch(e){alert("Error: "+e.message);}
  };

  if(sel){
    const mat=MATS.find(m=>m.id===sel.material);
    const ter=TERS.find(t=>t.id===sel.terminacion);
    return(
      <div className="fade">
        <button style={{...S.btn("ghost"),marginBottom:14}} onClick={()=>setSel(null)}>← Volver</button>
        <div style={S.card}>
          <div style={S.cardTitle}>Pedido recibido</div>
          <div style={{fontSize:12,color:C.textoSuave,marginBottom:10}}>{sel.descripcion} · {new Date(sel.created_at).toLocaleDateString("es-AR")}</div>
          <div style={{background:C.suave,borderRadius:8,padding:12,border:`1px solid ${C.borde}`}}>
            <div style={{...S.label,marginBottom:8}}>Medidas del cliente (en cm) con equivalencias</div>
            {[["Alto",sel.alto],["Ancho",sel.ancho],["Profundidad",sel.profundidad]].map(([n,v])=>(
              <div key={n} style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                <span style={{color:C.textoSuave}}>{n}:</span>
                <span style={{fontFamily:"monospace",color:C.marron,fontWeight:700}}>{v}cm = {cmToMm(v)}mm = {cmToIn(v)}"</span>
              </div>
            ))}
          </div>
          <div style={S.row,{marginTop:10}}>
            <div style={S.col()}><div style={S.label}>Material</div><div style={{fontWeight:700}}>{mat?.label}</div></div>
            <div style={S.col()}><div style={S.label}>Terminación</div><div>{ter?.label}{sel.color?` · ${sel.color}`:""}</div></div>
          </div>
        </div>

        <IAcarpinteria pedido={sel} onAplicar={aplicarIA}/>

        <div style={S.card}>
          <div style={S.cardTitle}>💰 Tu presupuesto</div>
          <div style={S.row}>
            <div style={S.col()}><label style={S.label}>Monto total ($)</label><input type="number" value={presF.monto} onChange={e=>setPresF(f=>({...f,monto:e.target.value}))} placeholder="0" style={S.input}/></div>
            <div style={S.col()}><label style={S.label}>Tiempo de entrega</label><input value={presF.tiempo} onChange={e=>setPresF(f=>({...f,tiempo:e.target.value}))} placeholder="Ej: 2 semanas" style={S.input}/></div>
          </div>
          <div style={{marginTop:10}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12,color:C.textoSuave}}>
              <input type="checkbox" checked={presF.incluye_flete} onChange={e=>setPresF(f=>({...f,incluye_flete:e.target.checked}))}/>
              Incluir flete propio en el presupuesto
            </label>
          </div>
          <div style={{marginTop:10}}>
            <label style={S.label}>Detalle (materiales, herrajes, mano de obra)</label>
            <textarea value={presF.detalle} onChange={e=>setPresF(f=>({...f,detalle:e.target.value}))} placeholder="Podés discriminar ítems o poner todo junto..." style={{...S.input,minHeight:80,resize:"vertical"}}/>
          </div>
          <button style={{...S.btn("dark"),marginTop:12,opacity:enviando||yaEnvio?0.6:1}} 
              onClick={enviarPresup} 
              disabled={enviando||yaEnvio}>
              {enviando?"⟳ Enviando...":(yaEnvio?"✅ Presupuesto enviado":"📤 Enviar presupuesto")}
            </button>
            {yaEnvio&&<div style={{fontSize:12,color:C.verde,marginTop:6,fontWeight:700}}>✅ El cliente ya recibió tu presupuesto.</div>}
        </div>

        <div style={S.card}>
          <div style={S.cardTitle}>💬 Chat con cliente</div>
          <Chat pedidoId={sel.id} tipoPedido="cliente" miUsuario={usuario} otroUsuario={{id:sel.cliente_id}}/>
        </div>
      </div>
    );
  }

  const tabStyle=(id)=>({background:tab===id?C.marron:"transparent",color:tab===id?C.crema:C.textoSuave,border:tab===id?"none":`1px solid ${C.borde}`,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Lato',sans-serif"});

  return(
    <div>
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {[["pedidos","📋 Pedidos recibidos"],["aserradero","🪵 Pedir madera"],["ferreteria","🔩 Pedir herrajes"],["conversion","📐 Conversor"]].map(([id,l])=>(
          <button key={id} style={tabStyle(id)} onClick={()=>setTab(id)}>{l}</button>
        ))}
      </div>

      {tab==="pedidos"&&(
        <div>
          <div style={S.secTitle}>Pedidos de presupuesto de clientes</div>
          {pedidos.length===0&&<div style={{...S.card,color:C.textoSuave,textAlign:"center",padding:28,fontStyle:"italic"}}>No hay pedidos aún</div>}
          {pedidos.map(p=>{
            const mat=MATS.find(m=>m.id===p.material);
            return(
              <div key={p.id} style={{...S.card,cursor:"pointer",transition:"all .15s"}} onClick={()=>{setSel(p);setYaEnvio(false);}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=C.acento;e.currentTarget.style.transform="translateY(-1px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.borde;e.currentTarget.style.transform="none";}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.marron,fontSize:15}}>{p.descripcion}</div>
                    <div style={{fontSize:12,color:C.textoSuave,marginTop:3}}>{p.alto}×{p.ancho}×{p.profundidad}cm · {mat?.label} · {new Date(p.created_at).toLocaleDateString("es-AR")}</div>
                  </div>
                  <Badge e={p.estado}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab==="aserradero"&&(

              </select>
            </div>
          </div>
          {convF.valor&&(()=>{
            const v=parseFloat(convF.valor);
            const cm=convF.unidad==="cm"?v:convF.unidad==="mm"?v/10:convF.unidad==="in"?v*2.54:v*30.48;
            return(
              <div style={{marginTop:14,background:C.suave,borderRadius:10,padding:16,border:`1px solid ${C.borde}`}}>
                <div style={S.row}>
                  {[["cm",cm.toFixed(2)],["mm",(cm*10).toFixed(0)],["pulgadas",(cm/2.54).toFixed(3)],["pies",(cm/30.48).toFixed(3)]].map(([u,val])=>(
                    <div key={u} style={{flex:1,textAlign:"center",padding:"10px 0",borderRight:`1px solid ${C.borde}`}}>

                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}

  );
}

// ─── VISTA ASERRADERO ─────────────────────────────────────────────────────────
function VistaAserradero({usuario,notif}){
  const [pedidos,setPedidos]=useState([]);
  const [sel,setSel]=useState(null);
  const [cotF,setCotF]=useState({monto:"",tiempo:"",detalle:""});

  const cargar=useCallback(async()=>{
    try{const d=await db.select("pedidos_aserradero","?order=created_at.desc");setPedidos(d);}catch{}
  },[]);
  useEffect(()=>{cargar();const t=setInterval(cargar,15000);return()=>clearInterval(t);},[cargar]);

  const aplicarIA=(s)=>{
    const det=s.items?.map(i=>`${i.concepto}: $${Number(i.monto).toLocaleString("es-AR")} — ${i.detalle}`).join("\n")||"";
    setCotF(f=>({...f,monto:String(s.precio_por_pie||f.monto),tiempo:s.tiempo_entrega||f.tiempo,detalle:det||f.detalle}));
  };

  const enviarCot=async()=>{
    if(!cotF.monto||!sel)return;
    try{
      await db.insert("cotizaciones_aserradero",{pedido_id:sel.id,aserradero_id:usuario.id,precio_por_pie:Number(cotF.monto),precio_total:Number(cotF.monto)*(sel.pies||1)*sel.cantidad,tiempo_entrega:cotF.tiempo,detalle:cotF.detalle});
      await db.update("pedidos_aserradero",{estado:"presupuestado"},`id=eq.${sel.id}`);
      notif("¡Cotización enviada!");
      setCotF({monto:"",tiempo:"",detalle:""});
    }catch(e){alert("Error: "+e.message);}
  };

  if(sel) return(
    <div className="fade">
      <button style={{...S.btn("ghost"),marginBottom:14}} onClick={()=>setSel(null)}>← Volver</button>
      <div style={S.card}>
        <div style={S.cardTitle}>Pedido de carpintería</div>
        <div style={{background:C.suave,borderRadius:8,padding:12,border:`1px solid ${C.borde}`}}>
          <div style={S.row}>
            <div style={S.col()}><div style={S.label}>Material</div><div style={{fontWeight:700,fontSize:15,color:C.marron}}>{sel.material}</div></div>
            <div style={S.col()}>
              <div style={S.label}>Medidas</div>
              <div style={{fontFamily:"monospace",color:C.marron}}>{sel.pies}' largo · {sel.pulgadas}" sección</div>
              <div style={{fontSize:10,color:C.textoSuave}}>= {ftToCm(sel.pies)}cm · {inToCm(sel.pulgadas)}cm</div>
            </div>
            <div style={S.col()}><div style={S.label}>Cantidad</div><div style={{fontWeight:700,fontSize:15,color:C.marron}}>{sel.cantidad} piezas</div></div>
          </div>
          {sel.descripcion&&<div style={{fontSize:12,color:C.textoSuave,marginTop:8,fontStyle:"italic"}}>{sel.descripcion}</div>}
        </div>
      </div>

      <IAaserradero pedido={sel} onAplicar={aplicarIA}/>

      <div style={S.card}>
        <div style={S.cardTitle}>💰 Tu cotización</div>
        <div style={S.row}>
          <div style={S.col()}><label style={S.label}>Precio por pie ($)</label><input type="number" value={cotF.monto} onChange={e=>setCotF(f=>({...f,monto:e.target.value}))} placeholder="0" style={S.input}/></div>
          <div style={S.col()}><label style={S.label}>Tiempo de entrega</label><input value={cotF.tiempo} onChange={e=>setCotF(f=>({...f,tiempo:e.target.value}))} placeholder="Ej: 3 días" style={S.input}/></div>
        </div>
        <div style={{marginTop:10}}><label style={S.label}>Detalle / condiciones</label><textarea value={cotF.detalle} onChange={e=>setCotF(f=>({...f,detalle:e.target.value}))} placeholder="Calidad, humedad, observaciones..." style={{...S.input,minHeight:56,resize:"vertical"}}/></div>
        <button style={{...S.btn("dark"),marginTop:12}} onClick={enviarCot}>📤 Enviar cotización</button>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>💬 Chat con carpintería</div>
        <Chat pedidoId={sel.id} tipoPedido="aserradero" miUsuario={usuario} otroUsuario={{id:sel.carpinteria_id}}/>
      </div>
    </div>
  );

  return(
    <div>
      <div style={S.secTitle}>Pedidos de madera de carpinterías</div>
      <div style={{fontSize:11,color:C.textoSuave,marginBottom:14,fontStyle:"italic"}}>Medidas en pulgadas y pies con equivalencia en cm</div>
      {pedidos.length===0&&<div style={{...S.card,color:C.textoSuave,textAlign:"center",padding:28,fontStyle:"italic"}}>No hay pedidos aún</div>}
      {pedidos.map(p=>(
        <div key={p.id} style={{...S.card,cursor:"pointer",transition:"all .15s"}} onClick={()=>setSel(p)}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.acento;e.currentTarget.style.transform="translateY(-1px)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.borde;e.currentTarget.style.transform="none";}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.marron,fontSize:15}}>{p.material}</div>
              <div style={{fontSize:12,color:C.textoSuave,marginTop:3,fontFamily:"monospace"}}>{p.pies}' × {p.pulgadas}" · {p.cantidad} piezas · {new Date(p.created_at).toLocaleDateString("es-AR")}</div>
            </div>
            <Badge e={p.estado}/>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── VISTA FLETE ──────────────────────────────────────────────────────────────
function VistaFlete({usuario,notif}){
  const [tab,setTab]=useState(usuario.tipo==="flete"?"agenda":"buscar");
  const [agenda,setAgenda]=useState([]);
  const [fletes,setFletes]=useState([]);
  const [pedF,setPedF]=useState({origen:"",destino:"",descripcion:"",fecha:""});

  const cargarAgenda=useCallback(async()=>{
    if(usuario.tipo!=="flete")return;
    try{
      const hoy=new Date();
      const dias=Array.from({length:7},(_,i)=>{const d=new Date(hoy);d.setDate(d.getDate()+i);return d.toISOString().slice(0,10);});
      const data=await db.select("agenda_flete",`?flete_id=eq.${usuario.id}&order=fecha.asc`);
      const mapa=Object.fromEntries(data.map(d=>[d.fecha,d]));
      setAgenda(dias.map(f=>mapa[f]||{flete_id:usuario.id,fecha:f,estado:"disponible",nuevo:true}));
    }catch{}
  },[usuario]);

  const cargarFletes=useCallback(async()=>{
    try{
      const data=await db.select("usuarios","?tipo=eq.flete");
      const con=await Promise.all(data.map(async fl=>{
        const ag=await db.select("agenda_flete",`?flete_id=eq.${fl.id}&order=fecha.asc&limit=5`);
        return{...fl,agenda:ag};
      }));
      setFletes(con);
    }catch{}
  },[]);

  useEffect(()=>{cargarAgenda();cargarFletes();},[cargarAgenda,cargarFletes]);

  const cambiarEstado=async(item,nuevoEstado)=>{
    try{
      if(item.nuevo||!item.id){await db.insert("agenda_flete",{flete_id:usuario.id,fecha:item.fecha,estado:nuevoEstado});}
      else{await db.update("agenda_flete",{estado:nuevoEstado},`id=eq.${item.id}`);}
      notif("Agenda actualizada");cargarAgenda();
    }catch{}
  };

  const solicitarFlete=async(fleteId)=>{
    if(!pedF.origen||!pedF.destino){alert("Completá origen y destino");return;}
    try{
      await db.insert("pedidos_flete",{solicitante_id:usuario.id,flete_id:fleteId,...pedF});
      notif("¡Solicitud enviada!");
      setPedF({origen:"",destino:"",descripcion:"",fecha:""});
    }catch{}
  };

  const tabStyle=(id)=>({background:tab===id?C.marron:"transparent",color:tab===id?C.crema:C.textoSuave,border:tab===id?"none":`1px solid ${C.borde}`,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Lato',sans-serif"});

  return(
    <div>
      {usuario.tipo==="flete"&&(
        <div style={{display:"flex",gap:7,marginBottom:16}}>
          {[["agenda","📅 Mi agenda"],["buscar","🚚 Ver todos"]].map(([id,l])=>(
            <button key={id} style={tabStyle(id)} onClick={()=>setTab(id)}>{l}</button>
          ))}
        </div>
      )}

      {tab==="agenda"&&usuario.tipo==="flete"&&(
        <div style={S.card}>
          <div style={S.cardTitle}>📅 Mi disponibilidad — próximos 7 días</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
            {agenda.map((d,i)=>(
              <div key={i} style={{background:C.input,border:`2px solid ${EC[d.estado||"disponible"]}44`,borderRadius:10,padding:10,textAlign:"center"}}>
                <div style={{fontSize:11,color:C.textoSuave,marginBottom:6,fontWeight:700}}>{new Date(d.fecha+"T12:00").toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"})}</div>
                <Badge e={d.estado||"disponible"}/>
                <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:8}}>
                  {["disponible","en_viaje","ocupado"].map(e=>(
                    <button key={e} style={{...S.tag((d.estado||"disponible")===e),padding:"3px 6px",fontSize:10}} onClick={()=>cambiarEstado(d,e)}>
                      {e==="disponible"?"✅":e==="en_viaje"?"🚚":"❌"}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {(tab==="buscar"||usuario.tipo!=="flete")&&(
        <div>
          <div style={S.secTitle}>🚚 Servicios de flete</div>
          <div style={{...S.card,marginBottom:14}}>
            <div style={S.cardTitle}>📤 Solicitar presupuesto de flete</div>
            <div style={S.row}>
              <div style={S.col()}><label style={S.label}>Origen</label><input value={pedF.origen} onChange={e=>setPedF(f=>({...f,origen:e.target.value}))} placeholder="Dirección de origen" style={S.input}/></div>
              <div style={S.col()}><label style={S.label}>Destino</label><input value={pedF.destino} onChange={e=>setPedF(f=>({...f,destino:e.target.value}))} placeholder="Dirección de destino" style={S.input}/></div>
            </div>
            <div style={{...S.row,marginTop:10}}>
              <div style={S.col()}><label style={S.label}>Descripción de la carga</label><input value={pedF.descripcion} onChange={e=>setPedF(f=>({...f,descripcion:e.target.value}))} placeholder="Ej: Mesa de roble 220×100, 80kg" style={S.input}/></div>
              <div style={{flex:.5}}><label style={S.label}>Fecha deseada</label><input type="date" value={pedF.fecha} onChange={e=>setPedF(f=>({...f,fecha:e.target.value}))} style={S.input}/></div>
            </div>
          </div>
          {pedF.origen&&pedF.destino&&(
            <a href={`https://www.openstreetmap.org/directions?engine=fossgis_osrm_car&route=${encodeURIComponent(pedF.origen)};${encodeURIComponent(pedF.destino)}`}
               target="_blank" rel="noopener noreferrer"
               style={{display:"inline-flex",alignItems:"center",gap:6,background:C.input,border:`1px solid ${C.borde}`,borderRadius:8,padding:"8px 14px",color:C.marron,fontSize:13,fontWeight:700,textDecoration:"none",marginTop:8}}>
              🗺️ Ver ruta en el mapa
            </a>
          )}

          {fletes.length===0&&<div style={{...S.card,color:C.textoSuave,textAlign:"center",padding:28,fontStyle:"italic"}}>No hay fletes registrados aún</div>}
          {fletes.map(fl=>(
            <div key={fl.id} style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:C.marron}}>{fl.nombre}</div>
                  <Stars v={fl.calificacion_promedio}/>
                  {fl.zonas&&<div style={{fontSize:11,color:C.textoSuave,marginTop:3}}>📍 {fl.zonas}</div>}
                  {fl.capacidad&&<div style={{fontSize:11,color:C.textoSuave}}>⚖️ {fl.capacidad}</div>}
                </div>
                <Badge e={fl.estado_flete||"disponible"}/>
              </div>
              {fl.agenda?.length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={{...S.label,marginBottom:8}}>Agenda</div>
                  <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                    {fl.agenda.map((d,i)=>(
                      <div key={i} style={{background:C.input,border:`1px solid ${EC[d.estado]||C.borde}44`,borderRadius:6,padding:"5px 9px",textAlign:"center"}}>
                        <div style={{fontSize:10,color:C.textoSuave}}>{new Date(d.fecha+"T12:00").toLocaleDateString("es-AR",{weekday:"short",day:"numeric"})}</div>
                        <Badge e={d.estado}/>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <button style={S.btn("dark")} onClick={()=>solicitarFlete(fl.id)}>📤 Solicitar a este flete</button>
              <Calificar deUsuario={usuario} paraUsuario={fl} pedidoId={null}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ─── VISTA FERRETERÍA ─────────────────────────────────────────────────────────
function VistaFerreteria({usuario,notif}){
  const [pedidos,setPedidos]=useState([]);
  const [sel,setSel]=useState(null);
  const [cotF,setCotF]=useState({monto:"",tiempo:"",detalle:""});

  const cargar=useCallback(async()=>{
    try{const d=await db.select("pedidos_ferreteria","?order=created_at.desc");setPedidos(d);}catch{}
  },[]);
  useEffect(()=>{cargar();const t=setInterval(cargar,15000);return()=>clearInterval(t);},[cargar]);

  const aplicarIA=(s)=>{
    const det=s.items?.map(i=>`${i.concepto}: $${Number(i.monto).toLocaleString("es-AR")} — ${i.detalle}`).join("\n")||"";
    setCotF(f=>({...f,monto:String(s.precio_total||f.monto),tiempo:s.tiempo_entrega||f.tiempo,detalle:det||f.detalle}));
  };

  const enviarCot=async()=>{
    if(!cotF.monto||!sel)return;
    try{
      await db.insert("cotizaciones_ferreteria",{pedido_id:sel.id,ferreteria_id:usuario.id,precio_total:Number(cotF.monto),tiempo_entrega:cotF.tiempo,detalle:cotF.detalle});
      await db.update("pedidos_ferreteria",{estado:"presupuestado"},`id=eq.${sel.id}`);
      notif("¡Cotización enviada!");
      setCotF({monto:"",tiempo:"",detalle:""});
    }catch(e){alert("Error: "+e.message);}
  };

  if(sel) return(
    <div>
      <button style={{...S.btn("ghost"),marginBottom:14}} onClick={()=>setSel(null)}>← Volver</button>
      <div style={S.card}>
        <div style={S.cardTitle}>Pedido de carpintería</div>
        <div style={{background:C.suave,borderRadius:8,padding:12,border:`1px solid ${C.borde}`}}>
          <div style={S.label}>HERRAJES SOLICITADOS</div>
          <div style={{fontWeight:700,fontSize:15,color:C.marron,marginTop:4}}>{sel.descripcion}</div>
          {sel.cantidad&&<div style={{fontSize:12,color:C.textoSuave,marginTop:4}}>Cantidad: {sel.cantidad} unidades</div>}
          {sel.notas&&<div style={{fontSize:12,color:C.textoSuave,fontStyle:"italic",marginTop:4}}>{sel.notas}</div>}
        </div>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>💰 Tu cotización</div>
        <div style={S.row}>
          <div style={S.col()}><label style={S.label}>Precio total ($)</label><input type="number" value={cotF.monto} onChange={e=>setCotF(f=>({...f,monto:e.target.value}))} placeholder="0" style={S.input}/></div>
          <div style={S.col()}><label style={S.label}>Tiempo de entrega</label><input value={cotF.tiempo} onChange={e=>setCotF(f=>({...f,tiempo:e.target.value}))} placeholder="Ej: 2 días" style={S.input}/></div>
        </div>
        <div style={{marginTop:10}}><label style={S.label}>Detalle / condiciones</label><textarea value={cotF.detalle} onChange={e=>setCotF(f=>({...f,detalle:e.target.value}))} placeholder="Marcas, modelos, observaciones..." style={{...S.input,minHeight:56,resize:"vertical"}}/></div>
        <button style={{...S.btn("dark"),marginTop:12}} onClick={enviarCot}>📤 Enviar cotización</button>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>💬 Chat con carpintería</div>
        <Chat pedidoId={sel.id} tipoPedido="ferreteria" miUsuario={usuario} otroUsuario={{id:sel.carpinteria_id}}/>
      </div>
    </div>
  );

  return(
    <div>
      <div style={S.secTitle}>Pedidos de herrajes de carpinterías</div>
      {pedidos.length===0&&<div style={{...S.card,color:C.textoSuave,textAlign:"center",padding:28,fontStyle:"italic"}}>No hay pedidos aún</div>}
      {pedidos.map(p=>(
        <div key={p.id} style={{...S.card,cursor:"pointer",transition:"all .15s"}} onClick={()=>setSel(p)}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.acento}
          onMouseLeave={e=>e.currentTarget.style.borderColor=C.borde}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.marron,fontSize:15}}>{p.descripcion}</div>
              <div style={{fontSize:12,color:C.textoSuave,marginTop:3}}>Cantidad: {p.cantidad} · {new Date(p.created_at).toLocaleDateString("es-AR")}</div>
            </div>
            <Badge e={p.estado}/>
          </div>
        </div>
      ))}
    </div>
  );
}

        {navTab==="principal"&&usuario.tipo==="carpinteria"&&<VistaCarpinteria usuario={usuario} notif={setNotifMsg}/>}
        {navTab==="principal"&&usuario.tipo==="aserradero"&&<VistaAserradero usuario={usuario} notif={setNotifMsg}/>}
        {navTab==="principal"&&usuario.tipo==="flete"&&<VistaFlete usuario={usuario} notif={setNotifMsg}/>}
        {navTab==="principal"&&usuario.tipo==="ferreteria"&&<VistaFerreteria usuario={usuario} notif={setNotifMsg}/>}
        {navTab==="flete"&&<VistaFlete usuario={usuario} notif={setNotifMsg}/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
